<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>·</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><circle cx='50' cy='50' r='38' stroke='white' stroke-width='7' fill='none'/></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><circle cx='50' cy='50' r='38' stroke='white' stroke-width='7' fill='none'/></svg>">
<style>
:root{
  --bg:#000;--bg2:#0d0d0d;--tile:#181818;--tile2:#141414;--tile-border:rgba(255,255,255,0.07);
  --accent:#3ddd65;--accent-dim:rgba(61,221,101,0.45);--accent-border:rgba(61,221,101,0.7);--accent-bright:#ffffff;
  --white:#e8e8e8;--ui:rgba(232,232,232,0.52);--ui2:rgba(232,232,232,0.32);
  --red:#e05555;--sep:rgba(255,255,255,0.06);--radius:16px;
  --safe-top:env(safe-area-inset-top,44px);--safe-bottom:env(safe-area-inset-bottom,20px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:#000;color:#ffffff;font-family:-apple-system,'SF Pro Text',BlinkMacSystemFont,sans-serif;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;font-weight:500;}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* SCREENS */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .62s cubic-bezier(.16,1,.3,1);background:#000;overflow:hidden;}
.screen.active{transform:translateX(0);}
.screen.slide-out{transform:translateX(-28%);}
#home{transform:translateX(0);}

/* HOME LAYOUT */
.habits-scroll{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:flex;flex-direction:column;justify-content:center;}
.habits-scroll::-webkit-scrollbar{display:none;}
.habits-inner{width:100%;max-width:500px;margin:0 auto;padding:calc(var(--safe-top) + 60px) 28px calc(var(--safe-bottom) + 160px);box-sizing:border-box;}
.habits-zone{display:flex;flex-direction:column;gap:10px;}
.habits-zone-spacer-top,.habits-zone-spacer-bottom,.temps-zone{display:none;}

/* TEMPS TRAY */
.temps-tray{position:fixed;left:0;right:0;bottom:calc(var(--safe-bottom) + 90px);z-index:5;display:none;flex-direction:column;align-items:center;max-height:90px;overflow:hidden;transition:max-height .5s cubic-bezier(.34,1.2,.64,1);}
.temps-tray.expanded{max-height:65dvh;}
.temps-tray::before{content:'';position:fixed;inset:0;bottom:0;background:rgba(0,0,0,0.82);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:-1;opacity:0;pointer-events:none;transition:opacity .4s ease;}
.temps-tray.expanded::before{opacity:1;pointer-events:all;}
.temps-tray-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.22);margin-bottom:12px;cursor:pointer;flex-shrink:0;}
.temps-tray-inner{width:100%;max-width:500px;padding:0 28px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
.temps-tray-inner::-webkit-scrollbar{display:none;}

/* HABIT TILE */
.habit-row{display:flex;align-items:center;gap:16px;padding:18px 26px 18px 28px;background:rgba(255,255,255,0.32);border:none;border-radius:var(--radius);cursor:pointer;will-change:opacity,transform;transition:opacity .25s ease,max-height .35s ease,padding .35s ease,margin .35s ease;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.habit-row.row-enter{opacity:0;transform:translateY(6px);}
.habit-row.row-visible{opacity:1;transform:translateY(0);transition:opacity .32s ease,transform .32s cubic-bezier(.2,.8,.4,1);}
.habit-row:active{opacity:.55;}
.habit-row.dimmed{opacity:.22;transition:opacity .4s ease;}
.habit-row.vanishing{overflow:hidden;pointer-events:none;opacity:0;max-height:0!important;padding-top:0!important;padding-bottom:0!important;margin:0!important;border-width:0!important;transition:opacity .26s ease,max-height .36s .08s cubic-bezier(.4,0,1,1),padding .36s .04s ease,margin .36s .04s ease,border-width .36s .04s ease!important;}
.habit-row.temp-row .habit-name{color:rgba(120,235,120,1);font-weight:500;}
.habit-name{font-size:18px;font-weight:600;color:#ffffff;letter-spacing:-.02em;flex:1;user-select:none;}
.habit-value-input{background:none;border:none;border-bottom:2px solid rgba(255,255,255,0.38);color:#ffffff;font-size:17px;font-family:inherit;outline:none;width:72px;text-align:right;padding:2px 0 4px;transition:border-color .2s;font-weight:600;}
.habit-value-input:focus{border-bottom-color:var(--accent-border);}
.habit-value-input::placeholder{color:transparent;}

/* HABIT GROUPS SEPARATOR */
.group-sep{height:16px;flex-shrink:0;}

/* DONE STATE */
.done-state{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .5s cubic-bezier(.4,0,.2,1);}
.done-state.show{opacity:1;}
@keyframes doneIn{0%{opacity:0;transform:translateX(-40px) scale(.88);}60%{opacity:1;transform:translateX(4px) scale(1.02);}80%{transform:translateX(-2px) scale(.99);}100%{opacity:1;transform:translateX(0) scale(1);}}
@keyframes checkDraw{0%{stroke-dashoffset:90;}70%{stroke-dashoffset:8;}100%{stroke-dashoffset:0;}}
.done-mark{display:flex;align-items:center;justify-content:center;opacity:0;}
.done-state.show .done-mark{animation:doneIn 1s .05s cubic-bezier(.22,1,.36,1) forwards;}
.done-mark svg{color:#4ade80;width:77px;height:77px;stroke-dasharray:90;stroke-dashoffset:90;opacity:1;}
.done-state.show .done-mark svg{animation:checkDraw 1s .3s cubic-bezier(.22,1,.36,1) forwards;}

/* ADD TEMP overlay */
.temp-overlay{position:fixed;inset:0;z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0 16px 24px;opacity:0;pointer-events:none;transition:opacity .22s ease;}
.temp-overlay.open{opacity:1;pointer-events:all;}
.temp-overlay-blur{position:absolute;inset:0;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(0,0,0,0.78);}
.temp-card{position:relative;z-index:1;width:100%;max-width:440px;margin:0 auto;background:none;border:none;border-radius:0;padding:0;display:flex;flex-direction:column;gap:18px;align-items:center;}
.temp-card-field{width:100%;background:rgba(255,255,255,0.32);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:none;border-radius:14px;padding:16px 18px;color:#ffffff;font-size:20px;font-weight:400;font-family:inherit;outline:none;transition:background .2s;text-align:center;letter-spacing:-.02em;}
.temp-card-field:focus{border-color:var(--accent-border);}
.temp-card-sectors{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.sector-pill{padding:8px 16px;border-radius:20px;border:none;background:rgba(255,255,255,0.05);color:var(--ui);font-size:14px;cursor:pointer;font-family:inherit;transition:all .15s;}
.sector-pill.active{background:rgba(61,221,101,0.45);border:none;color:#fff;font-weight:600;}

/* BOTTOM BAR — buttons at 1/3 and 2/3 */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--safe-bottom) + 110px);
  z-index:10;pointer-events:none;
}
.btn-ghost-zone{
  position:absolute;
  width:58px;height:58px;border-radius:50%;
  background:transparent;
  border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;pointer-events:all;
  color:rgba(255,255,255,0.9);
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  bottom:calc(var(--safe-bottom) + 56px);
  transform:translateX(-50%);
}
#btnTime{ left:33.33%; }
#btnTasks{ left:66.66%; }
.btn-ghost-zone:active{color:#fff;opacity:.6;}

/* OVERLAY */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0);pointer-events:none;transition:background .3s;}
.overlay.open{background:rgba(0,0,0,.8);pointer-events:all;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}

/* SHEET */
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:101;background:#111;border-radius:20px 20px 0 0;border:none;transform:translateY(100%);transition:transform .36s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;max-height:88dvh;padding-bottom:var(--safe-bottom);}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:34px;height:4px;border-radius:2px;background:rgba(255,255,255,0.1);margin:10px auto 0;flex-shrink:0;cursor:pointer;}
.sheet-body{flex:1;overflow-y:auto;padding:12px 22px 20px;scrollbar-width:none;}
.sheet-body::-webkit-scrollbar{display:none;}

/* INPUT SHEET */
.input-sheet{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#111;border-radius:20px 20px 0 0;border:none;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);padding:12px 22px calc(var(--safe-bottom)+16px);}
.input-sheet.open{transform:translateY(0);}
.is-handle{width:34px;height:4px;border-radius:2px;background:rgba(255,255,255,0.1);margin:0 auto 14px;}
.is-label{font-size:14px;color:var(--ui);margin-bottom:8px;opacity:.7;font-weight:400;}
.is-field{width:100%;background:rgba(255,255,255,0.32);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:none;border-radius:14px;padding:16px 18px;color:#ffffff;font-size:20px;font-weight:400;font-family:inherit;outline:none;transition:background .2s;text-align:center;letter-spacing:-.02em;}
.is-field:focus{background:rgba(255,255,255,0.38);}
.is-confirm{width:100%;margin-top:10px;background:rgba(61,221,101,0.55);color:#fff;font-size:17px;font-weight:600;border:none;border-radius:12px;padding:14px;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.is-confirm:active{opacity:.7;}
.extras-done{display:flex;align-items:center;justify-content:center;padding:32px 0;}
.extras-done svg{color:#4ade80;opacity:1;}

/* SETTINGS */
.settings-header{position:relative;top:0;left:0;z-index:10;padding:calc(var(--safe-top)+4px) 0 0 4px;flex-shrink:0;}
.btn-back{display:flex;align-items:center;justify-content:center;width:48px;height:48px;background:none;border:none;color:var(--accent);font-size:28px;cursor:pointer;opacity:.7;line-height:1;}
.btn-back:active{opacity:1;}
.settings-scroll{flex:1;overflow-y:auto;scrollbar-width:none;padding-top:16px;padding-bottom:calc(var(--safe-bottom)+40px);}
.settings-scroll::-webkit-scrollbar{display:none;}
.s-section{padding:0 18px;margin-top:20px;}
.s-section-title{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ui);margin-bottom:10px;padding:0 4px;opacity:.5;display:flex;align-items:center;justify-content:center;gap:6px;}

/* SECTOR BLOCK */
.sector-block{margin-bottom:28px;}
.sector-block-header{display:flex;align-items:center;justify-content:center;padding:10px 4px;cursor:pointer;transition:opacity .15s;}
.sector-block-header:active{opacity:.6;}
.sbn{font-size:18px;color:#ffffff;font-weight:400;}
.sector-habits-box{margin-top:6px;background:rgba(255,255,255,0.32);border-radius:12px;overflow:hidden;padding:2px 0;}
.sector-habit-row{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:grab;touch-action:none;transition:opacity .15s;user-select:none;-webkit-user-select:none;}
.sector-habit-row:active{opacity:.5;cursor:grabbing;}
.shr-name{flex:1;font-size:17px;color:#ffffff;font-weight:600;}
.add-habit-row{display:flex;align-items:center;justify-content:center;padding:10px 4px;color:rgba(255,255,255,0.35);cursor:pointer;touch-action:auto;transition:opacity .15s;}
.add-habit-row:active{opacity:.8;}
.add-sector-btn-icon{display:flex;align-items:center;justify-content:center;width:100%;padding:12px;border-radius:12px;border:none;background:none;color:rgba(255,255,255,0.3);cursor:pointer;transition:all .15s;}
.add-sector-btn-icon:active{opacity:.8;}

/* SECTOR EDIT PANEL */
.sector-edit-panel{display:none;}
.sector-block.expanded .sector-edit-panel{display:block;}
.sector-edit-card{background:rgba(255,255,255,0.13);border-radius:14px;padding:16px;margin-bottom:10px;}
.sec-name-input{display:block;width:100%;background:none;border:none;border-bottom:1px solid rgba(255,255,255,0.25);color:#ffffff;font-size:20px;font-weight:500;font-family:inherit;outline:none;padding:4px 0 8px;text-align:center;margin-bottom:18px;}
.sec-name-input:focus{border-bottom-color:var(--accent-border);}
.sec-schedule-list{display:flex;flex-direction:column;gap:14px;}
.sec-schedule-row{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px;background:rgba(255,255,255,0.12);border-radius:10px;}
.sec-time-line{display:flex;align-items:center;gap:5px;justify-content:center;}
.sec-days-line{display:flex;gap:4px;justify-content:center;}
.time-input{background:rgba(255,255,255,0.12);border:none;border-radius:8px;padding:7px 8px;color:#ffffff;font-size:15px;font-weight:600;font-family:inherit;outline:none;width:52px;text-align:center;transition:background .2s;}
.time-input:focus{background:rgba(255,255,255,0.2);}
.time-colon{color:var(--ui);opacity:.5;font-size:15px;}
.time-dash{color:var(--ui);opacity:.35;font-size:13px;padding:0 2px;}
.day-mini-btn{width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,0.05);color:var(--ui);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.day-mini-btn.on{background:var(--accent-dim);color:var(--accent-bright);}
.del-sched-btn{width:22px;height:22px;background:none;border:none;color:var(--ui);opacity:.25;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:opacity .15s;flex-shrink:0;}
.del-sched-btn:active{opacity:.8;color:var(--red);}
.add-schedule-wrap{display:flex;justify-content:center;margin-top:10px;}
.add-schedule-btn{width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s;}
.add-schedule-btn:active{opacity:.9;}
.sector-actions-row{display:flex;gap:10px;margin-top:12px;justify-content:center;}
.sec-act-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 28px;border-radius:12px;background:rgba(255,255,255,0.05);border:none;font-size:15px;font-weight:400;font-family:inherit;cursor:pointer;transition:all .15s;color:var(--ui);}
.sec-act-btn.danger{color:var(--red);background:rgba(224,85,85,0.07);}
.sec-act-btn.save-ico{color:var(--accent-bright);background:var(--accent-dim);}
.sec-act-btn:active{opacity:.6;}

/* BOTTOM ICON ROW */
.bottom-icon-row{display:flex;gap:10px;margin-top:8px;}
.bic-btn{flex:1;display:flex;align-items:center;justify-content:center;padding:13px 8px;border-radius:14px;background:rgba(255,255,255,0.05);border:none;cursor:pointer;font-family:inherit;transition:all .15s;color:#ffffff;}
.bic-btn:active{opacity:.6;}
.bic-btn.open-state{background:var(--accent-dim);color:var(--accent-bright);}
.bic-btn svg{width:17px;height:17px;}

/* SETTINGS PANEL ROWS */
.s-panel-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 6px;
  cursor:pointer;
  transition:opacity .15s;
  
}
.s-panel-row:last-child{border-bottom:none;}
.s-panel-row:active{opacity:.6;}
.s-panel-row.open .s-panel-label{color:var(--accent-bright);}
.s-panel-row.open .s-panel-chevron{transform:rotate(90deg);}
.s-panel-label{font-size:15px;color:rgba(255,255,255,0.6);font-weight:400;}
.s-panel-chevron{display:flex;align-items:center;color:rgba(255,255,255,0.25);transition:transform .2s;}
.s-panel-body{
  padding:6px 0 12px;
  
  margin-bottom:2px;
}

/* SETTINGS LOCK BUTTON at bottom */
.settings-lock-btn{
  position:fixed;bottom:calc(var(--safe-bottom)+20px);right:20px;
  z-index:5;
  width:44px;height:44px;border-radius:50%;
  background:none;border:none;
  color:rgba(255,255,255,0.18);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .2s;
  pointer-events:all;
}
.settings-lock-btn:active{opacity:.7;}

/* PANELS */
.panel-wrap{background:rgba(255,255,255,0.03);border:none;border-radius:var(--radius);overflow:hidden;margin-top:10px;}
.done-task-row{display:flex;align-items:center;padding:10px 14px;}
.dt-name{flex:1;font-size:14px;color:rgba(232,232,232,0.45);}
.done-clear-btn{width:100%;padding:10px;margin-top:8px;background:rgba(224,85,85,0.06);border:none;border-radius:var(--radius);font-size:13px;font-family:inherit;cursor:pointer;color:rgba(224,85,85,0.45);display:flex;align-items:center;justify-content:center;gap:6px;}
.done-clear-btn:active{opacity:1;background:rgba(224,85,85,0.07);color:var(--red);}

/* STREAK panel — last 7 days, day-number only */
.streak-sector-pills{display:flex;}
.streak-pill{flex:1;padding:9px 8px;border:none;background:none;color:var(--ui);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;}
.streak-pill:last-child{border-right:none;}
.streak-pill.active{background:var(--accent-dim);color:var(--accent-bright);}
.streak-list{display:flex;flex-direction:column;gap:10px;padding:12px 14px;}
.streak-row{display:flex;align-items:center;gap:10px;}
.srn{font-size:12px;color:var(--ui);width:70px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.streak-bar-wrap{flex:1;position:relative;height:20px;display:flex;align-items:center;gap:2px;}
.streak-day-dot{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.07);position:relative;}
.streak-day-dot.done{background:rgba(52,199,89,0.5);}
.streak-day-dot.done.today{background:rgba(52,199,89,0.9);}
.streak-day-num{position:absolute;bottom:-11px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(255,255,255,0.2);white-space:nowrap;}
.streak-count{font-size:11px;color:var(--accent);font-weight:600;min-width:20px;text-align:right;opacity:.7;}
.streak-dots-header{display:flex;gap:2px;padding:0 14px 4px;margin-top:6px;}
.streak-dot-label{flex:1;text-align:center;font-size:9px;color:rgba(255,255,255,0.2);}

.empty{display:flex;align-items:center;justify-content:center;padding:16px;}
.empty-text{font-size:12px;color:var(--ui);opacity:.4;}

/* DONE STATE — tasks (niebieski) */
.done-state-tasks{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .5s cubic-bezier(.4,0,.2,1);}
.done-state-tasks.show{opacity:1;}
.done-mark-tasks{display:flex;align-items:center;justify-content:center;opacity:0;}
.done-state-tasks.show .done-mark-tasks{animation:doneIn 1s .05s cubic-bezier(.22,1,.36,1) forwards;}
.done-mark-tasks svg{color:#60a5fa;width:77px;height:77px;stroke-dasharray:90;stroke-dashoffset:90;opacity:1;}
.done-state-tasks.show .done-mark-tasks svg{animation:checkDraw 1s .3s cubic-bezier(.22,1,.36,1) forwards;}


.extras-list-box{background:rgba(255,255,255,0.32);border-radius:12px;overflow:hidden;padding:2px 0;margin-bottom:10px;}
.extra-setting-row{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:grab;touch-action:none;transition:opacity .15s;user-select:none;-webkit-user-select:none;}
.extra-setting-row:active{opacity:.6;cursor:grabbing;}
.extra-s-name{flex:1;font-size:17px;color:#ffffff;font-weight:600;}
.del-btn{width:24px;height:24px;background:none;border:none;color:rgba(255,255,255,0.4);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.5;transition:opacity .15s;line-height:1;}
.del-btn:active{opacity:1;color:var(--red);}
.drag-lift{opacity:.45!important;background:rgba(255,255,255,0.09)!important;}

/* HABIT DETAIL */
.habit-detail-screen{position:fixed;inset:0;z-index:300;background:#000;transform:translateY(100%);transition:transform .38s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;overflow:hidden;}
.habit-detail-screen.open{transform:translateY(0);}
.hd-header{padding:calc(var(--safe-top)+2px) 20px 10px;display:flex;align-items:center;border:none;flex-shrink:0;}
.hd-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;padding:0 24px calc(var(--safe-bottom)+60px);scrollbar-width:none;}
.hd-body::-webkit-scrollbar{display:none;}
.hd-top-row{display:flex;align-items:center;gap:10px;padding:36px 0 30px;}
.type-mini-btns{display:flex;gap:5px;flex-shrink:0;}
.type-mini-btn{width:38px;height:38px;border-radius:10px;border:none;background:rgba(255,255,255,0.06);color:#ffffff;font-size:14px;cursor:pointer;font-family:inherit;transition:all .18s;display:flex;align-items:center;justify-content:center;}
.type-mini-btn.active{background:var(--accent-dim);color:var(--accent-bright);font-weight:600;}
.days-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:30px;}
.day-btn{width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,0.06);color:#ffffff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s;}
.day-btn.active{background:var(--accent-dim);color:var(--accent-bright);}
.hd-url-arch-row{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:0 4px;}
.url-input{flex:1;background:rgba(255,255,255,0.09);border:none;border-radius:10px;padding:9px 12px;color:#ffffff;font-size:13px;font-weight:500;font-family:inherit;outline:none;min-width:0;transition:background .2s;}
.url-input:focus{background:rgba(255,255,255,0.14);}
.url-input::placeholder{color:rgba(255,255,255,0.3);}
.arch-toggle-row{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.arch-toggle-label{font-size:13px;color:#ffffff;opacity:.7;}
.toggle{width:44px;height:26px;border-radius:13px;background:rgba(255,255,255,0.08);border:none;position:relative;cursor:pointer;transition:background .22s;flex-shrink:0;}
.toggle.on{background:var(--accent);}
.toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .22s cubic-bezier(.34,1.4,.64,1);box-shadow:0 1px 4px rgba(0,0,0,.3);}
.toggle.on::after{transform:translateX(18px);}
.hd-spacer{flex:1;min-height:20px;}
.save-btn{width:100%;background:rgba(61,221,101,0.55);color:#fff;font-size:16px;font-weight:600;border:none;border-radius:12px;padding:15px;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.save-btn:active{opacity:.7;}
.delete-btn{width:100%;background:none;border:none;padding:14px;margin-top:4px;color:rgba(224,85,85,0.5);font-size:14px;font-family:inherit;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;border-radius:12px;}
.delete-btn:active{color:var(--red);}
.delete-btn.confirm-pending{color:#fff;background:rgba(224,85,85,0.85);border-radius:12px;}
.sec-act-btn.danger.confirm-pending{color:#fff;background:rgba(224,85,85,0.85);}

/* EXTRA DETAIL */
.extra-detail-screen{position:fixed;inset:0;z-index:301;background:#000;transform:translateY(100%);transition:transform .38s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;overflow:hidden;}
.extra-detail-screen.open{transform:translateY(0);}

/* ADD EXTRA SHEET */
.type-selector{display:flex;gap:6px;}
.type-btn{flex:1;padding:10px;border-radius:10px;border:none;background:rgba(255,255,255,0.06);color:#ffffff;font-size:14px;cursor:pointer;font-family:inherit;transition:all .18s;text-align:center;display:flex;align-items:center;justify-content:center;}
.type-btn.active{background:var(--accent-dim);color:var(--accent-bright);}
.hd-name-input{flex:1;background:rgba(255,255,255,0.32);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:none;border-radius:14px;padding:15px 18px;color:#ffffff;font-size:20px;font-weight:400;font-family:inherit;outline:none;text-align:center;transition:background .2s;letter-spacing:-.02em;}
.hd-name-input:focus{background:rgba(255,255,255,0.42);}
.hd-name-input::placeholder{color:rgba(255,255,255,0.28);}

/* ══════════════════════════════════════════
   TIME TRACKER SCREEN
══════════════════════════════════════════ */
#timeTracker{background:#000;}
.tt-header{
  position:fixed;top:0;left:0;z-index:10;
  padding:calc(var(--safe-top)+4px) 0 0 4px;
}
.tt-scroll{
  position:absolute;inset:0;
  padding-top:calc(var(--safe-top)+52px);
  padding-bottom:calc(var(--safe-bottom)+160px);
  padding-right:60px;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  display:flex;
  flex-direction:column;
}
.tt-scroll::-webkit-scrollbar{display:none;}
.tt-grid{
  width:100%;
  padding:0;
  display:flex;flex-direction:column;
  gap:0;
  min-height:100%;
  justify-content:flex-start;
}
/* Each row = 1 hour, 4 blocks of 15min */
.tt-hour-label{
  width:44px;flex-shrink:0;
  display:flex;align-items:center;justify-content:flex-end;
  padding-right:10px;
  font-size:15px;font-weight:600;
  color:rgba(255,255,255,0.9);
  letter-spacing:-.01em;
  user-select:none;
}
.tt-blocks{
  flex:1;
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:0;padding:0;
}
/* Square blocks */
.tt-block{
  width:100%;
  background:rgba(255,255,255,0.32);
  border:none;border-radius:0;
  cursor:pointer;
  transition:background .12s,opacity .1s;
  position:relative;
  user-select:none;-webkit-user-select:none;
  touch-action:none;
  overflow:visible;
}
.tt-block:before{
  content:'';display:block;
  padding-top:var(--tt-block-pt, 100%);
}
.tt-block:active{opacity:.7;}
.tt-block.selecting{background:rgba(61,221,101,0.65)!important;}
/* Filled block: black */
.tt-block.filled{background:#000;border:none;pointer-events:all;cursor:pointer;overflow:visible;}
.tt-block.filled:active{opacity:.7;}
.tt-block.filled::after{display:none;}
/* Hour ruler tick — appears at bottom of every hour row */
.tt-hour-tick{
  position:absolute;bottom:0;left:0;
  width:100%;height:2px;
  display:flex;align-items:flex-end;
}
.tt-hour-row{
  display:flex;align-items:stretch;
  gap:0;
  position:relative;
}
/* TIME ENTRY PANEL */
.tt-entry-panel{
  position:absolute;bottom:0;left:0;right:0;
  z-index:120;background:#000;
  border-radius:20px 20px 0 0;
  border:none;
  transform:translateY(100%);
  transition:transform .36s cubic-bezier(.32,.72,0,1);
  padding:14px 22px calc(var(--safe-bottom)+16px);
}
.tt-entry-panel.open{transform:translateY(0);}
.tt-entry-handle{width:34px;height:4px;border-radius:2px;background:rgba(255,255,255,0.1);margin:0 auto 14px;cursor:pointer;}
.tt-entry-duration{
  font-size:18px;color:#ffffff;font-weight:500;
  text-align:center;margin-bottom:12px;
  letter-spacing:-.02em;min-height:24px;
}
.tt-entry-field{
  width:100%;background:rgba(255,255,255,0.32);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:none;
  border-radius:14px;padding:16px 18px;
  color:#ffffff;font-size:20px;font-weight:400;
  font-family:inherit;
  outline:none;transition:background .2s;margin-bottom:12px;
  text-align:center;letter-spacing:-.02em;
}
.tt-entry-field:focus{background:rgba(255,255,255,0.38);}
.tt-cat-row{
  display:flex;gap:8px;
  margin-bottom:12px;justify-content:space-between;align-items:center;
}
.tt-cat-pill{
  padding:7px 14px;border-radius:20px;
  border:none;
  background:rgba(255,255,255,0.05);
  color:var(--ui);font-size:13px;
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.tt-cat-pill.active{background:var(--accent-dim);color:var(--accent-bright);}
.tt-entry-save{
  width:100%;background:var(--accent-dim);color:var(--white);
  font-size:16px;font-weight:400;border:none;
  border-radius:12px;padding:14px;cursor:pointer;
  font-family:inherit;transition:opacity .15s;
}
.tt-entry-save:active{opacity:.7;}

/* TEMP ADD BTN in sheet */
.temp-add-btn{
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:none;
  color:rgba(255,255,255,0.6);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
}
.temp-add-btn:active{background:rgba(255,255,255,0.14);color:rgba(255,255,255,0.9);}

/* LOCK TRIGGER — centered gray icon */
.s-lock-trigger{
  width:44px;height:44px;border-radius:50%;
  background:none;border:none;
  color:rgba(255,255,255,0.22);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:color .2s;
}
.s-lock-trigger:active{color:rgba(255,255,255,0.4);}
.s-lock-trigger.s-lock-open{color:rgba(255,255,255,0.35);}

/* LOCK PANEL */
.s-lock-panel{
  margin-top:8px;
  background:rgba(255,255,255,0.03);
  border:none;
  border-radius:14px;
  overflow:hidden;
  padding:0;
}

/* SETTINGS PANEL ROWS */
.s-panel-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 16px;
  cursor:pointer;
  border:none;
  transition:background .15s;
  background:rgba(255,255,255,0.04);
}
.s-panel-row:active{background:rgba(255,255,255,0.08);}
.s-panel-row.s-panel-open{background:rgba(255,255,255,0.06);}
.s-panel-label{font-size:15px;color:#ffffff;font-weight:400;}
.s-panel-icon{color:rgba(255,255,255,0.45);display:flex;align-items:center;}
.s-panel-chevron{display:none;}
.s-panel-body{padding:12px 16px 14px;}

/* Time categories settings in settings panel */
.tt-cats-box{background:rgba(255,255,255,0.14);border-radius:12px;overflow:hidden;padding:2px 0;margin-bottom:10px;}
.tt-cat-setting-row{display:flex;align-items:center;gap:10px;padding:11px 16px;}
.tt-cat-s-name{flex:1;font-size:17px;color:#ffffff;font-weight:400;}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="home" class="screen active">
  <div class="done-state" id="doneState">
    <div class="done-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
  </div>
  <!-- Habits -->
  <div class="habits-scroll">
    <div class="habits-inner">
      <div class="habits-zone" id="habitsList"></div>
    </div>
  </div>
  <!-- Bottom bar: left = time tracker, right = temp tasks -->
  <div class="bottom-bar">
    <!-- Left: time tracker — clock face as ring/outline -->
    <button class="btn-ghost-zone" id="btnTime" onclick="openTimeTracker()">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="22" cy="22" r="19" stroke-width="2.2"/>
        <polyline points="22 12 22 22 28 26" stroke-width="2.2"/>
      </svg>
    </button>
    <!-- Right: temp tasks — circle ring outline -->
    <button class="btn-ghost-zone" id="btnTasks" onclick="openTempScreen()">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none" stroke="currentColor" stroke-linecap="round">
        <circle cx="22" cy="22" r="19" stroke-width="2.2"/>
      </svg>
    </button>
  </div>

  <!-- Ghost tap zones: top of screen split in half -->
  <!-- Left half top → extras/habits sheet (same as swipe from left) -->
  <div style="position:fixed;top:0;left:0;width:50%;height:calc(var(--safe-top)+52px);z-index:50;cursor:pointer;" onclick="openSheet()"></div>
  <!-- Settings icon top-right (replaces right-half ghost zone) -->
  <button onclick="openSettings()" style="position:fixed;top:calc(var(--safe-top) + 8px);right:12px;z-index:50;width:36px;height:36px;border-radius:50%;background:none;border:none;color:rgba(255,255,255,0.25);cursor:pointer;display:flex;align-items:center;justify-content:center">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</div>

<!-- ADD TEMP overlay (triggered by left-ghost or swipe-up) -->
<div class="temp-overlay" id="tempOverlay">
  <div class="temp-overlay-blur" onclick="closeAddTemp()"></div>
  <div class="temp-card">
    <input class="temp-card-field" id="addTempField" placeholder="" enterkeyhint="done" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="sentences">
    <div class="temp-card-sectors" id="tempSectorPicker"></div>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen" style="overflow:visible;display:flex;flex-direction:column;">
  <div class="settings-header">
    <button class="btn-back" onclick="closeSettings()">‹</button>
  </div>
  <div class="settings-scroll" id="settingsScroll"></div>
</div>

<!-- MONEY SCREEN -->
<div id="moneyOverlay" style="position:fixed;inset:0;z-index:500;background:#000;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .55s cubic-bezier(.16,1,.3,1);">
  <!-- Back arrow -->
  <div class="settings-header">
    <button class="btn-back" onclick="closeMoney()">‹</button>
  </div>

  <!-- Center content -->
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px;gap:0;min-height:0;padding-bottom:80px;">
    <!-- Big number -->
    <div id="moneyDisplay" style="font-size:68px;font-weight:200;color:#ffffff;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;text-align:center;line-height:1;margin-bottom:48px;">0</div>
    <!-- Categories -->
    <div id="moneyCatRow" style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:400px;"></div>
    <!-- Extra note field — shown below categories, always visible, plain keyboard -->
    <input id="moneyNoteInput" type="text" inputmode="text" enterkeyhint="done" autocapitalize="sentences" autocomplete="off"
      placeholder=""
      style="margin-top:10px;width:100%;max-width:400px;background:rgba(255,255,255,0.32);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:none;border-radius:var(--radius);padding:16px 18px;color:#ffffff;font-size:18px;font-weight:400;text-align:center;font-family:inherit;outline:none;box-sizing:border-box;letter-spacing:-.02em;"
      onkeydown="if(event.key==='Enter'){event.preventDefault();saveMoney();}">
  </div>

  <!-- Save at bottom -->
  <div style="position:absolute;bottom:0;left:0;right:0;padding:16px 20px;padding-bottom:calc(var(--safe-bottom)+16px);">
    <button class="save-btn" onclick="saveMoney()">Zapisz</button>
  </div>

  <!-- Hidden decimal input -->
  <input id="moneyAmountInput" type="text" inputmode="decimal" enterkeyhint="done"
    style="position:fixed;top:-300px;left:-300px;width:1px;height:1px;opacity:0;border:none;outline:none;"
    oninput="moneyAmountOninput(this.value)"
    onkeydown="moneyAmountKeydown(event)">
</div>

<!-- TIME TRACKER -->
<div id="timeTracker" class="screen" style="overflow:visible;">
  <div class="tt-header">
    <button class="btn-back" id="ttBackBtn" onclick="closeTimeTracker()">‹</button>
    <button id="ttSaveHabitBtn" onclick="saveTTHabitMode()" style="display:none;position:absolute;right:16px;top:calc(var(--safe-top)+8px);background:none;border:none;color:var(--accent);font-size:17px;font-family:inherit;cursor:pointer;padding:4px 8px">Zapisz</button>
  </div>
  <div class="tt-scroll" id="ttScroll">
    <div class="tt-grid" id="ttGrid"></div>
  </div>
  <!-- Backdrop: tap above panel to close -->
  <div id="ttEntryBackdrop" style="position:absolute;inset:0;z-index:119;display:none" onclick="closeTTEntry()"></div>
  <!-- Entry panel -->
  <div class="tt-entry-panel" id="ttEntryPanel">
    <div class="tt-entry-handle" onclick="closeTTEntry()"></div>
    <div class="tt-entry-duration" id="ttEntryDuration"></div>
    <input class="tt-entry-field" id="ttEntryField" placeholder="" autocomplete="off" autocapitalize="sentences" enterkeyhint="done">
    <div class="tt-cat-row" id="ttCatRow"></div>
  </div>
  <!-- Bottom Zapisz — shown in habit mode after selection, with duration display -->
  <div id="ttHabitSaveBar" style="display:none;position:absolute;bottom:0;left:0;right:0;padding:16px 22px calc(var(--safe-bottom)+16px);background:rgba(0,0,0,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.08);z-index:125">
    <div id="ttHabitDuration" style="font-size:22px;font-weight:300;letter-spacing:0.02em;text-align:center;color:#fff;min-height:28px;margin-bottom:4px"></div>
    <div id="ttHabitDurationSub" style="font-size:13px;color:rgba(255,255,255,0.5);text-align:center;margin-bottom:12px;min-height:18px"></div>
    <button onclick="saveTTHabitMode()" class="save-btn">Zapisz</button>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeAllSheets()"></div>

<!-- EXTRAS SHEET (dodatkowe habits — swipe z lewej / lewy górny) -->
<div class="sheet" id="mainSheet">
  <div class="sheet-handle" onclick="closeSheet()"></div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<!-- ══ TASKS SCREEN ══ -->
<div id="tempScreen" style="position:absolute;inset:0;background:#000;transform:translateX(100%);transition:transform .62s cubic-bezier(.16,1,.3,1);z-index:10;overflow:visible;">
  <!-- all tasks view button — fixed like settings gear, not clipped by notch -->
  <button onclick="openAllTasksView()" style="position:fixed;top:calc(var(--safe-top) + 8px);right:12px;z-index:3;background:none;border:none;color:rgba(255,255,255,0.45);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:10px;width:36px;height:36px">
    <span style="width:18px;height:1.5px;background:currentColor;border-radius:1px;display:block"></span>
    <span style="width:18px;height:1.5px;background:currentColor;border-radius:1px;display:block"></span>
  </button>
  <!-- blue done checkmark -->
  <div class="done-state-tasks" id="doneStateTasks">
    <div class="done-mark-tasks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
  </div>
  <!-- task list, centered vertically like habits -->
  <div style="position:absolute;top:0;left:0;right:0;bottom:120px;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:flex;align-items:center;justify-content:center;padding-top:calc(var(--safe-top) + 44px);">
    <div style="width:100%;max-width:500px;padding:0 28px">
      <div id="tempScreenList" style="display:flex;flex-direction:column;gap:10px"></div>
    </div>
  </div>
  <!-- bottom: back arrow moved from top-left to bottom-left -->
  <button class="btn-back" onclick="closeTempScreen()" style="position:absolute;bottom:40px;left:18px;z-index:3">‹</button>
  <button ontouchstart="openTempAddOverlayTouch(event)" onclick="openTempAddOverlay()" style="position:absolute;bottom:40px;left:50%;transform:translateX(-50%);width:58px;height:58px;border-radius:50%;background:rgba(96,165,250,0.18);border:none;color:#60a5fa;display:flex;align-items:center;justify-content:center;cursor:pointer">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<!-- ══ ADD TASK OVERLAY ══ -->
<div id="tempAddOverlay" style="position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;visibility:hidden;opacity:0;transition:opacity .22s,visibility .22s;">
  <div onclick="closeTempAddOverlay()" style="position:absolute;inset:0;background:rgba(0,0,0,0.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)"></div>
  <div id="tempAddCard" style="position:relative;z-index:1;width:100%;max-width:440px;padding:0 24px 32px;display:flex;flex-direction:column;gap:20px;align-items:stretch">
    <div id="tempAddSectors" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center"></div>
    <input id="tempAddField" enterkeyhint="done" inputmode="text" autocomplete="off" autocapitalize="sentences"
      style="width:100%;background:rgba(255,255,255,0.32);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:none;border-radius:16px;padding:18px 20px;color:#fff;font-size:20px;font-weight:400;font-family:inherit;outline:none;text-align:center;letter-spacing:-.02em;box-sizing:border-box;-webkit-user-select:text;user-select:text;">
  </div>
</div>

<!-- ══ ALL TASKS VIEW ══ -->
<div id="allTasksView" class="screen" style="z-index:15;overflow:visible;display:flex;flex-direction:column;">
  <div class="settings-header">
    <button class="btn-back" onclick="closeAllTasksView()">‹</button>
  </div>

<script>
const DAYS=['P','W','Ś','C','P','S','N'];
const chevR=`<svg width="6" height="10" viewBox="0 0 6 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 1 5 5 1 9"/></svg>`;
const plusSVG=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
const trashSVG=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>`;
const checkSVG=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
const folderSVG=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`;
const lockSVG=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;
const clockSVG=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 7 12 12 15 14"/></svg>`;

function defaultState(){
  return{
    sectors:[
      {id:'s1',name:'💼',schedules:[{startH:8,startM:0,endH:16,endM:0,weekdays:[0,1,2,3,4]}]},
      {id:'s2',name:'🏠',schedules:[{startH:17,startM:0,endH:21,endM:0,weekdays:[0,1,2,3,4]}]},
      {id:'sw',name:'☀️',schedules:[{startH:8,startM:0,endH:22,endM:0,weekdays:[5,6]}]},
    ],
    habits:[],
    extraStats:[],
    tempTasks:[],doneTasks:[],daily:{},streaks:{},streakSectorId:'s1',
    _doneOpen:false,_streakOpen:false,_archiveOpen:false,_lockOpen:false,_csvOpen:false,_csvSectorId:null,_timeStatsOpen:false,_statsOpen:false,_timePeriod:'week',
    timeCategories:[
      {id:'tc1',name:'💼',color:'#8B6914'},
      {id:'tc2',name:'🌱',color:'#2d7a3a'},
      {id:'tc3',name:'❌',color:'#7a2d2d'},
    ],
    timeEntries:{}, // keyed by date → array of {id,label,catId,blocks:[{h,q}]}
    moneyCategories:[
      {id:'mc1',name:'🍎 Food',order:0,color:'#ef4444'},
    ],
    moneyEntries:[], // array of {id,date,amount,catId,note}
    _moneyOpen:false,
  };
}

function migrateState(s){
  const nm={'Praca':'💼','Dom':'🏠','Weekend':'☀️'};
  for(const sec of s.sectors){
    if(nm[sec.name]) sec.name=nm[sec.name];
    if(!sec.schedules) sec.schedules=[{startH:sec.startH||8,startM:sec.startM||0,endH:sec.endH||17,endM:sec.endM||0,weekdays:sec.weekdays||[0,1,2,3,4]}];
  }
  for(const h of s.habits){
    if(h.paused!==undefined&&h.archived===undefined){ h.archived=h.paused; delete h.paused; }
    if(h.order===undefined) h.order=0;
  }
  for(const e of (s.extraStats||[])){
    if(e.order===undefined) e.order=0;
    if(e.url===undefined) e.url='';
    if(e.trackTime===undefined) e.trackTime=false;
    if(e.trackCatId===undefined) e.trackCatId=null;
  }
  s._doneOpen=false; s._streakOpen=false; s._archiveOpen=false; s._timeStatsOpen=false;
  if(!s._lockOpen) s._lockOpen=false;
  if(!s._csvOpen) s._csvOpen=false;
  if(!s._csvSectorId) s._csvSectorId=null;
  if(!s._statsOpen) s._statsOpen=false;
  if(!s.timeCategories) s.timeCategories=[{id:'tc1',name:'💼'},{id:'tc2',name:'🌱'},{id:'tc3',name:'❌'}];
  // Migrate old text-heavy names to emoji-only
  const emojiMap={'💼 Praca':{name:'💼',color:'#8B6914'},'🌱 Rozwój':{name:'🌱',color:'#2d7a3a'},'❌ Strata':{name:'❌',color:'#7a2d2d'}};
  for(const c of (s.timeCategories||[])){ if(emojiMap[c.name]){ c.name=emojiMap[c.name].name; if(!c.color) c.color=emojiMap[c.name]?.color||'#555'; } }
  if(!s.timeEntries) s.timeEntries={};
  if(!s.moneyCategories) s.moneyCategories=[{id:'mc1',name:'🍎 Food',order:0,color:'#ef4444'}];
  if(!s.moneyEntries) s.moneyEntries=[];
  if(!s._moneyOpen) s._moneyOpen=false;
  return s;
}

let state;
try{ const r=localStorage.getItem('hs9'); state=r?migrateState(JSON.parse(r)):defaultState(); }catch{ state=defaultState(); }
function save(){ try{ localStorage.setItem('hs9',JSON.stringify(state)); }catch{} }

function today(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function jsDay(){ const d=new Date().getDay(); return d===0?6:d-1; }
function fmtDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function getDayData(){ const k=today(); if(!state.daily[k]) state.daily[k]={habits:{},extras:{},temps:{}}; return state.daily[k]; }
function isDone(v){ return v!==undefined&&v!==null&&v!==false&&v!==''; }

function getActiveSector(){
  const now=new Date(); const cur=now.getHours()*60+now.getMinutes(); const jsd=jsDay();
  for(const s of state.sectors)
    for(const sc of (s.schedules||[]))
      if(sc.weekdays.includes(jsd)&&cur>=sc.startH*60+sc.startM&&cur<sc.endH*60+sc.endM) return s;
  return null;
}

function chkSVG(){ return `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`; }

/* ── RENDER HOME ── */
function renderHome(){
  const sector=getActiveSector();
  const hList=document.getElementById('habitsList');
  const ds=document.getElementById('doneState');
  if(!hList) return;

  if(!sector){
    Array.from(hList.children).forEach(r=>{ r.style.maxHeight=r.offsetHeight+'px'; r.classList.add('vanishing'); });
    setTimeout(()=>{ hList.innerHTML=''; ds.classList.add('show'); },420);
    return;
  }
  const dd=getDayData(); const jsd=jsDay();
  const habits=state.habits.filter(h=>h.sectorId===sector.id&&!h.archived&&h.days.includes(jsd));
  habits.sort((a,b)=>(a.order||0)-(b.order||0));
  const remaining=habits.filter(h=>!isDone(dd.habits[h.id]));

  if(remaining.length===0){
    Array.from(hList.children).forEach(r=>{ r.style.maxHeight=r.offsetHeight+'px'; r.classList.add('vanishing'); });
    setTimeout(()=>{ hList.innerHTML=''; ds.classList.add('show'); },400);
    return;
  }
  ds.classList.remove('show');

  function diffZone(container, items, makeRow){
    Array.from(container.children).forEach(row=>{
      if(!items.find(it=>it.key===row.dataset.key)){
        row.style.maxHeight=row.offsetHeight+'px';
        row.classList.add('vanishing');
        row.addEventListener('transitionend',()=>row.remove(),{once:true});
      }
    });
    items.forEach((item,i)=>{
      let row=container.querySelector(`[data-key="${item.key}"]`);
      if(!row){
        row=makeRow(item); row.dataset.key=item.key;
        container.insertBefore(row,container.children[i]||null);
        requestAnimationFrame(()=>requestAnimationFrame(()=>row.classList.replace('row-enter','row-visible')));
      } else {
        if(row!==container.children[i]) container.insertBefore(row,container.children[i]||null);
        row.classList.remove('dimmed');
      }
    });
  }

  diffZone(hList, remaining.map(h=>({key:'h'+h.id,h})), item=>{
    const h=item.h, row=document.createElement('div');
    row.id='row-'+h.id; row.className='habit-row row-enter';
    row.onclick=()=>handleHabitTap(h.id);
    if(h.trackTime && (h.type==='number'||h.type==='text')){
      // trackTime + number/text: show input field, tap row → ask value then open TT
      row.innerHTML=`<span class="habit-name" style="flex:1">${h.name}</span><input class="habit-value-input" type="${h.type==='number'?'number':'text'}" inputmode="${h.type==='number'?'numeric':'text'}" placeholder="" onclick="event.stopPropagation()" onchange="completeHabitInputThenTime('${h.id}',this)">`;
    } else if(h.trackTime){
      // trackTime on (checkbox): entire row is tap-to-open-tracker
      row.innerHTML=`<span class="habit-name">${h.name}</span>`;
    } else if(h.type==='number'||h.type==='text'){
      row.innerHTML=`<span class="habit-name" style="flex:1">${h.name}</span><input class="habit-value-input" type="${h.type==='number'?'number':'text'}" inputmode="${h.type==='number'?'numeric':'text'}" placeholder="" onclick="event.stopPropagation()" onchange="completeHabitInput('${h.id}',this)">`;
    } else {
      row.innerHTML=`<span class="habit-name">${h.name}</span>`;
    }
    return row;
  });
}

/* ── THINGS TAP ── */
const timers={};
function thingsTap(key,onConfirm){
  const row=document.getElementById(`row-${key}`);
  if(!row) return;
  if(timers[key]){ clearTimeout(timers[key]); delete timers[key]; row.classList.remove('dimmed'); return; }
  row.classList.add('dimmed');
  timers[key]=setTimeout(()=>{
    delete timers[key];
    if(!row.isConnected){ renderHome(); return; }
    row.style.maxHeight=row.offsetHeight+'px';
    onConfirm();
    requestAnimationFrame(()=>row.classList.add('vanishing'));
    row.addEventListener('transitionend',()=>renderHome(),{once:true});
  },1400);
}
function handleHabitTap(hId){
  const h=state.habits.find(x=>x.id===hId); if(!h) return;
  if(h.trackTime){
    if(h.type==='number'||h.type==='text'){
      openInputSheetThenTime(h);
      return;
    }
    openTimeTracker(hId); return;
  }
  if(h.type==='number'||h.type==='text') return;
  if(h.url){ thingsTap(hId,()=>{ completeHabit(hId,true); try{ window.open(h.url,'_blank'); }catch(e){} }); return; }
  thingsTap(hId,()=>completeHabit(hId,true));
}

function openInputSheetThenTime(h){
  curHabit=h;
  document.getElementById('inputSheetLabel').textContent=h.name;
  const f=document.getElementById('inputSheetField');
  f.value=''; f.type=h.type==='number'?'number':'text';
  f.inputMode=h.type==='number'?'numeric':'text';
  f.placeholder=h.type==='number'?'0':'';
  // Replace confirm button behavior
  const confirmBtn=document.querySelector('#inputSheet .is-confirm');
  if(confirmBtn){
    confirmBtn._origOnclick=confirmBtn.onclick;
    confirmBtn.onclick=()=>{
      const v=f.value.trim();
      if(v){ completeHabit(h.id,v); }
      closeInputSheet();
      confirmBtn.onclick=confirmBtn._origOnclick;
      openTimeTracker(h.id);
    };
  }
  showSheet('inputSheet');
  setTimeout(()=>f.focus(),340);
}
function handleTempTap(tId){
  thingsTap(`t${tId}`,()=>{
    const dd=getDayData(); if(!dd.temps) dd.temps={};
    dd.temps[tId]=true;
    const t=(state.tempTasks||[]).find(x=>x.id===tId);
    if(t){ state.doneTasks.push({...t,doneDate:today()}); state.tempTasks=state.tempTasks.filter(x=>x.id!==tId); }
    save();
  });
}
function completeHabit(hId,val){ const dd=getDayData(); dd.habits[hId]=val; updateStreak(hId,true); save(); }
function completeHabitInput(hId,input){
  const val=input.value.trim(); if(!val) return;
  input.blur();
  const row=document.getElementById('row-'+hId); if(!row) return;
  completeHabit(hId,val);
  row.style.maxHeight=row.offsetHeight+'px';
  requestAnimationFrame(()=>row.classList.add('vanishing'));
  row.addEventListener('transitionend',()=>renderHome(),{once:true});
}
function completeHabitInputThenTime(hId,input){
  const val=input.value.trim(); if(!val) return;
  input.blur();
  if(val) completeHabit(hId,val);
  openTimeTracker(hId);
}

/* ── INPUT SHEET ── */
let curHabit=null;
function openInputSheet(h){
  curHabit=h;
  document.getElementById('inputSheetLabel').textContent=h.name;
  const f=document.getElementById('inputSheetField');
  f.value=''; f.type=h.type==='number'?'number':'text';
  f.inputMode=h.type==='number'?'numeric':'text';
  f.placeholder=h.type==='number'?'0':'';
  showSheet('inputSheet');
  setTimeout(()=>f.focus(),340);
}
function closeInputSheet(){ hideSheet('inputSheet'); curHabit=null; }
function confirmInput(){
  if(!curHabit) return;
  const v=document.getElementById('inputSheetField').value.trim();
  if(v){ completeHabit(curHabit.id,v); closeInputSheet(); }
  else closeInputSheet();
}

/* ── ADD TEMP ── */
let selTempSector=null;
function openAddTemp(){
  if(!state.tempTasks) state.tempTasks=[];
  selTempSector=getActiveSector()?.id||state.sectors[0]?.id;
  renderTempSectors();
  document.getElementById('addTempField').value='';
  document.getElementById('tempOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('addTempField').focus(),50);
}
function updateTempOverlayPos(){
  const ov=document.getElementById('tempOverlay');
  if(!ov.classList.contains('open')) return;
  const vv=window.visualViewport;
  if(!vv){ ov.style.paddingBottom='300px'; return; }
  const kbHeight=window.innerHeight-(vv.offsetTop+vv.height);
  ov.style.paddingBottom=Math.max(kbHeight+16,24)+'px';
  ov.style.top='0'; ov.style.bottom='0'; ov.style.height='';
}
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',updateTempOverlayPos);
  window.visualViewport.addEventListener('scroll',updateTempOverlayPos);
}
function renderTempSectors(){
  document.getElementById('tempSectorPicker').innerHTML=state.sectors.map(s=>
    `<div class="sector-pill${s.id===selTempSector?' active':''}" onclick="setTempSector('${s.id}',this)">${s.name}</div>`
  ).join('');
}
function setTempSector(id,el){
  selTempSector=id;
  document.querySelectorAll('#tempSectorPicker .sector-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
}
function closeAddTemp(){
  document.getElementById('addTempField').blur();
  const ov=document.getElementById('tempOverlay');
  ov.classList.remove('open');
  ov.style.bottom='';ov.style.top='';ov.style.height='';
}
let _addTempCallback=null;
function confirmAddTemp(){
  const f=document.getElementById('addTempField');
  const name=f?.value.trim(); f?.blur();
  if(!name){ closeAddTemp(); _addTempCallback=null; return; }
  if(!state.tempTasks) state.tempTasks=[];
  state.tempTasks.push({id:'t'+Date.now(),name,sectorId:selTempSector||state.sectors[0]?.id,created:today()});
  save(); closeAddTemp(); renderHome();
  if(_addTempCallback){ _addTempCallback(); _addTempCallback=null; }
}
document.getElementById('addTempField').addEventListener('keydown',e=>{ if(e.key==='Enter'||e.keyCode===13){ e.preventDefault(); confirmAddTemp(); } });
document.getElementById('tempAddField').addEventListener('keydown',e=>{ if(e.key==='Enter'||e.keyCode===13){ e.preventDefault(); confirmTempAdd(); } });

/* ── EXTRAS SHEET ── */
function openSheet(){
  const dd=getDayData(); const body=document.getElementById('sheetBody');
  const extras=(state.extraStats||[]).slice().sort((a,b)=>(a.order||0)-(b.order||0));
  const pending=extras.filter(e=>!isDone(dd.extras?.[e.id]));
  if(!pending.length){
    body.innerHTML=`<div class="extras-done"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>`;
    showSheet('mainSheet'); return;
  }
  let html='<div style="display:flex;flex-direction:column;gap:10px;padding:8px 0">';
  for(const e of pending){
    if(e.trackTime){
      // trackTime extras — tap opens time screen, no input field
      html+=`<div class="habit-row row-visible" id="xrow-${e.id}" style="animation:none" onclick="openExtraTimeScreen('${e.id}')">
        <span class="habit-name">${e.name}</span>
      </div>`;
    } else if(e.type==='checkbox'){
      html+=`<div class="habit-row row-visible" id="xrow-${e.id}" style="animation:none" data-eid="${e.id}" onclick="completeExtraCheck('${e.id}')">
        <span class="habit-name">${e.name}</span>
      </div>`;
    } else {
      html+=`<div class="habit-row row-visible" id="xrow-${e.id}" style="animation:none">
        <span class="habit-name" style="flex:1">${e.name}</span>
        <input class="habit-value-input" type="${e.type==='number'?'number':'text'}" inputmode="${e.type==='number'?'numeric':'text'}" placeholder="" onclick="event.stopPropagation()" onchange="completeExtraInput('${e.id}',this)">
      </div>`;
    }
  }
  html+='</div>';
  body.innerHTML=html; showSheet('mainSheet');
}
function completeExtraCheck(eId){
  const dd=getDayData(); if(!dd.extras) dd.extras={};
  dd.extras[eId]=true; save();
  const row=document.getElementById('xrow-'+eId);
  if(row){ row.style.maxHeight=row.offsetHeight+'px'; row.classList.add('vanishing'); row.addEventListener('transitionend',()=>openSheet(),{once:true}); }
}
function completeExtraInput(eId,input){
  const val=input.value.trim(); if(!val) return;
  input.blur();
  const dd=getDayData(); if(!dd.extras) dd.extras={};
  dd.extras[eId]=val; save();
  const row=document.getElementById('xrow-'+eId);
  if(row){ row.style.maxHeight=row.offsetHeight+'px'; row.classList.add('vanishing'); row.addEventListener('transitionend',()=>openSheet(),{once:true}); }
}

let _extraTimeId=null;
let etSelBlocks=new Set();
function openExtraTimeScreen(eId){
  _extraTimeId=eId;
  etSelBlocks.clear();
  const e=state.extraStats.find(x=>x.id===eId); if(!e) return;
  document.getElementById('etHabitName').textContent=e.name;
  renderExtraTimeGrid();
  document.getElementById('extraTimeScreen').style.transform='translateY(0)';
}
function closeExtraTimeScreen(){
  document.getElementById('extraTimeScreen').style.transform='translateY(100%)';
  _extraTimeId=null; etSelBlocks.clear();
  updateEtDuration();
}
function saveExtraTime(){
  if(!_extraTimeId){ closeExtraTimeScreen(); return; }
  const e=state.extraStats.find(x=>x.id===_extraTimeId); if(!e) return;
  const dd=getDayData(); if(!dd.extras) dd.extras={};
  dd.extras[_extraTimeId]=true;
  if(etSelBlocks.size>0){
    const blocks=Array.from(etSelBlocks).map(k=>{const[hh,q]=k.split(':');return{h:+hh,q:+q};});
    const k=today();
    if(!state.timeEntries) state.timeEntries={};
    if(!state.timeEntries[k]) state.timeEntries[k]=[];
    state.timeEntries[k].push({id:'tt'+Date.now(),label:e.name,catId:e.trackCatId||(state.timeCategories||[])[0]?.id,blocks});
  }
  save(); closeExtraTimeScreen(); openSheet();
}
function renderExtraTimeGrid(){
  const inner=document.getElementById('etGridInner'); if(!inner) return;
  const filled=getFilledBlocks();
  const now=new Date(); const curH=now.getHours();
  const startH=Math.max(0,curH-4);
  let html='';
  for(let h=startH;h<24;h++){
    const allFull=[0,1,2,3].every(q=>filled.has(`${h}:${q}`)); if(allFull) continue;
    html+=`<div class="tt-hour-row" style="gap:0"><div class="tt-hour-label">${h}</div><div class="tt-blocks" style="position:relative">`;
    for(let q=0;q<4;q++){
      const key=`${h}:${q}`;
      const isSel=etSelBlocks.has(key);
      const isFilled=filled.has(key);
      html+=`<div class="tt-block${isFilled?' filled':''}${isSel?' selecting':''}" data-h="${h}" data-q="${q}"
        style="${isFilled?'background:#000;':''}${isSel&&!isFilled?'background:rgba(61,221,101,0.45);':''}"
        ontouchstart="etBlockTouch(event,${h},${q})"
        ontouchmove="etBlockMove(event)"
        ontouchend="etBlockEnd()"
        onclick="etBlockClick(${h},${q})"></div>`;
    }
    html+=`</div></div>`;
  }
  inner.innerHTML=html;
  updateEtDuration();
  requestAnimationFrame(()=>{
    const grid=document.getElementById('etGrid');
    const first=inner.firstElementChild;
    if(first&&grid) grid.scrollTop=Math.max(0,first.offsetTop-100);
  });
}
let etTouchStartH=-1,etTouchStartQ=-1,etTouchEndH=-1,etTouchEndQ=-1,etTouchActive=false;
function etBlockClick(h,q){
  const key=`${h}:${q}`;
  if(etSelBlocks.has(key)) etSelBlocks.delete(key); else etSelBlocks.add(key);
  renderExtraTimeGrid();
}
function etBlockTouch(e,h,q){
  e.preventDefault(); etTouchActive=true;
  etTouchStartH=h; etTouchStartQ=q; etTouchEndH=h; etTouchEndQ=q;
  etSelBlocks.clear(); etUpdateRange(); renderExtraTimeGrid();
}
function etBlockMove(e){
  if(!etTouchActive) return; e.preventDefault();
  const t=e.touches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const dh=parseInt(el?.dataset?.h),dq=parseInt(el?.dataset?.q);
  if(isNaN(dh)||isNaN(dq)||(dh===etTouchEndH&&dq===etTouchEndQ)) return;
  etTouchEndH=dh; etTouchEndQ=dq; etUpdateRange(); renderExtraTimeGrid();
}
function etBlockEnd(){ etTouchActive=false; }
function etUpdateRange(){
  const s=blockIndex(etTouchStartH,etTouchStartQ), e2=blockIndex(etTouchEndH,etTouchEndQ);
  const lo=Math.min(s,e2),hi=Math.max(s,e2);
  etSelBlocks.clear();
  for(let i=lo;i<=hi;i++){const{h,q}=indexToHQ(i);etSelBlocks.add(`${h}:${q}`);}
}
function updateEtDuration(){
  const el=document.getElementById('etDuration'); if(!el) return;
  if(!etSelBlocks.size){el.innerHTML='';return;}
  const sorted=[...etSelBlocks].map(k=>{const[h,q]=k.split(':');return{h:+h,q:+q};}).sort((a,b)=>blockIndex(a.h,a.q)-blockIndex(b.h,b.q));
  const f=sorted[0],l=sorted[sorted.length-1];
  const fmt=(h,q)=>`${h}:${String(q*15).padStart(2,'0')}`;
  const eq=(l.q+1)%4,eh=l.h+(l.q===3?1:0);
  const mins=etSelBlocks.size*15,hh=Math.floor(mins/60),m=mins%60;
  el.innerHTML=`<span style="font-size:22px;font-weight:300">${fmt(f.h,f.q)}–${fmt(eh,eq)}</span><span style="display:block;font-size:13px;color:rgba(255,255,255,0.5);margin-top:2px">${hh>0?hh+'h':''}${m>0?' '+m+'m':''}</span>`;
}

    row.style.maxHeight=row.offsetHeight+'px';

    setTimeout(()=>{
      const dd=getDayData(); if(!dd.temps) dd.temps={};

      if(t){ state.doneTasks.push({...t,doneDate:today()}); state.tempTasks=state.tempTasks.filter(x=>x.id!==tId); }

      requestAnimationFrame(()=>row.classList.add('vanishing'));

/* ── STREAKS — last 7 days, day-number only ── */
function updateStreak(hId,done){
  if(!state.streaks[hId]) state.streaks[hId]=[];
  const t=today();
  const i=state.streaks[hId].findIndex(x=>x.date===t);
  if(i>=0) state.streaks[hId][i].done=done;
  else state.streaks[hId].push({date:t,done});
  state.streaks[hId]=state.streaks[hId].slice(-90);
}
function getLast7(hId){
  const out=[]; const d=new Date(); const t=today();
  for(let i=6;i>=0;i--){
    const d2=new Date(d); d2.setDate(d.getDate()-i);
    const k=fmtDate(d2);
    const e=(state.streaks[hId]||[]).find(x=>x.date===k);
    out.push({done:e?.done||false,isToday:k===t,dayNum:d2.getDate()});
  }
  return out;
}
function getStreakCount(hId){
  const arr=(state.streaks[hId]||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  let cnt=0;
  for(const e of arr){ if(!e.done) break; cnt++; }
  return cnt;
}
function setStreakSector(id){ state.streakSectorId=id; save(); renderSettings(); }

/* ── SETTINGS ── */
function openSettings(){
  renderSettings();
  document.getElementById('home').classList.add('slide-out');
  document.getElementById('settings').classList.add('active');
  document.querySelector('.habits-scroll').style.overflow='hidden';
}
function closeSettings(){
  const s=document.getElementById('settings'), h=document.getElementById('home');
  s.style.transition=''; h.style.transition='';
  s.style.transform=''; h.style.transform='';
  h.classList.remove('slide-out'); s.classList.remove('active');
  document.querySelector('.habits-scroll').style.overflow='';
}

      html+=`</tr></thead><tbody>`;
      for(const day of days7){
        const hasAny=activeHabits.some(h=>isDone(state.daily?.[day.key]?.habits?.[h.id]));

        if(tCatEntries.length===1){
          const [[catId,mins]]=tCatEntries;
          const cat=timeCats.find(c=>c.id===catId);
          const col=tCatColor(cat,0);
          svgP=`<circle cx="${pcx}" cy="${pcy}" r="${R}" fill="${col}" opacity="0.85"/>`;
          const hh=Math.floor(mins/60),m=mins%60;
          const dur=hh>0?`${hh}h${m>0?' '+m+'m':''}`:m+'m';
          legH=`<div style="display:flex;align-items:center;gap:7px;padding:1px 0"><span style="width:9px;height:9px;border-radius:50%;background:${col};flex-shrink:0;display:inline-block"></span><span style="flex:1;font-size:12px;color:rgba(255,255,255,0.7)">${cat?.name||catId}</span><span style="font-size:12px;font-weight:600;color:#fff">100%</span><span style="font-size:12px;color:rgba(255,255,255,0.45)">${dur}</span></div>`;
        } else {
          tCatEntries.forEach(([catId,mins],i)=>{
            const cat=timeCats.find(c=>c.id===catId);
            const col=tCatColor(cat,i);
            const ang=(mins/totalMins)*Math.PI*2, ea=sa+ang;
            const x1=pcx+R*Math.cos(sa),y1=pcy+R*Math.sin(sa);
            const x2=pcx+R*Math.cos(ea),y2=pcy+R*Math.sin(ea);
            svgP+=`<path d="M${pcx},${pcy} L${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${ang>Math.PI?1:0},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${col}" opacity="0.85"/>`;
            sa=ea;
            const hh=Math.floor(mins/60),m=mins%60;
            const dur=hh>0?`${hh}h${m>0?' '+m+'m':''}`:m+'m';
            legH+=`<div style="display:flex;align-items:center;gap:7px;padding:1px 0">
              <span style="width:9px;height:9px;border-radius:50%;background:${col};flex-shrink:0;display:inline-block"></span>

              <span style="font-size:12px;font-weight:600;color:#fff">${Math.round(mins/totalMins*100)}%</span>

            <circle cx="68" cy="68" r="28" fill="#000"/>
            <text x="68" y="65" text-anchor="middle" fill="#fff" font-size="13" font-weight="200" font-family="-apple-system,sans-serif">${totDur.split(' ')[0]}</text>
            <text x="68" y="79" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10" font-family="-apple-system,sans-serif">${totDur.split(' ')[1]||''}</text>
          </svg>
          <div style="flex:1;display:flex;flex-direction:column;gap:5px">${legH}</div>

        // Per-category entries
        tCatEntries.forEach(([catId,mins],i)=>{
          const cat=timeCats.find(c=>c.id===catId);
          const col=tCatColor(cat,i);
          const hh=Math.floor(mins/60),m=mins%60;

          // Collect entries for this cat in period
          const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-(timePeriod===30||timePeriod==='month'?30:7));
          const entryRows=[];
          Object.entries(state.timeEntries||{}).forEach(([dateKey,dayEnts])=>{
            if(new Date(dateKey+'T00:00:00')<cutoff) return;

function getTimeStats(period){
  // period: 'week'(7d), 'month'(30d), 'all'
  const stats={}; // catId -> mins
  const now=new Date();
  const keys=Object.keys(state.timeEntries||{});
  for(const k of keys){
    const d=new Date(k);
    const diffDays=(now-d)/(1000*60*60*24);
    if(period==='week'&&diffDays>7) continue;
    if(period==='month'&&diffDays>30) continue;
    for(const e of (state.timeEntries[k]||[])){
      const mins=(e.blocks?.length||0)*15;
      stats[e.catId]=(stats[e.catId]||0)+mins;
    }
  }
  return stats;
}
function getTimeWeekStats(){ return getTimeStats('week'); }

const _delTimers={};
function askDelete(btn,label,onConfirm){
  if(btn.classList.contains('confirm-pending')){
    clearTimeout(_delTimers[label]);
    delete _delTimers[label];
    btn.classList.remove('confirm-pending');
    btn.innerHTML=btn._origHTML||btn.innerHTML;
    onConfirm();
    return;
  }
  btn._origHTML=btn.innerHTML;
  btn.classList.add('confirm-pending');
  btn.innerHTML=`Usuń „${label}"?`;
  _delTimers[label]=setTimeout(()=>{
    btn.classList.remove('confirm-pending');
    btn.innerHTML=btn._origHTML||btn.innerHTML;
    delete _delTimers[label];
  },3000);
}

  const sectorDays=sector?(sector.schedules||[]).reduce((set,sc)=>{ (sc.weekdays||[]).forEach(d=>set.add(d)); return set; },new Set()):new Set([0,1,2,3,4,5,6]);

let htHabitId=null, htSelBlocks=new Set();

function openHabitTimeScreen(hId){

  document.getElementById('habitTimeScreen').style.transform='translateY(100%)';

}
function saveHabitTime(){
  if(!htHabitId||!htSelBlocks.size){ closeHabitTimeScreen(); completeHabit(htHabitId||'',true); renderHome(); return; }
  const h=state.habits.find(x=>x.id===htHabitId); if(!h) return;
  const blocks=Array.from(htSelBlocks).map(k=>{const[hh,q]=k.split(':');return{h:+hh,q:+q};});
  const k=today();
  if(!state.timeEntries) state.timeEntries={};
  if(!state.timeEntries[k]) state.timeEntries[k]=[];
  state.timeEntries[k].push({id:'tt'+Date.now(),label:h.name,catId:h.trackCatId||(state.timeCategories||[])[0]?.id,blocks});
  completeHabit(htHabitId,true);
  save(); closeHabitTimeScreen(); renderHome();
}
function renderHabitTimeGrid(){
  const inner=document.getElementById('htGridInner'); if(!inner) return;
  const filled=getFilledBlocks();
  // Show only unfilled hours near current time
  const now=new Date(); const curH=now.getHours();
  const startH=Math.max(0,curH-4);
  let html='';
  for(let h=startH;h<24;h++){
    const allFull=[0,1,2,3].every(q=>filled.has(`${h}:${q}`)); if(allFull) continue;
    html+=`<div class="tt-hour-row" style="gap:0"><div class="tt-hour-label">${h}</div><div class="tt-blocks" style="position:relative">`;
    for(let q=0;q<4;q++){
      const key=`${h}:${q}`;
      const isSel=htSelBlocks.has(key);
      const isFilled=filled.has(key);
      html+=`<div class="tt-block${isFilled?' filled':''}${isSel?' selecting':''}" data-h="${h}" data-q="${q}"
        style="${isFilled?'background:#000;':''}${isSel&&!isFilled?'background:rgba(61,221,101,0.45);':''}"
        ontouchstart="htBlockTouch(event,${h},${q})"
        ontouchmove="htBlockMove(event)"
        ontouchend="htBlockEnd()"
        onclick="htBlockClick(${h},${q})"></div>`;
    }
    html+=`</div></div>`;
  }
  inner.innerHTML=html;
  updateHtDuration();
  // Scroll to current time
  requestAnimationFrame(()=>{
    const grid=document.getElementById('htGrid');
    const row=inner.querySelector(`[id^="tt-row"]`)||inner.firstElementChild;
    if(row) grid.scrollTop=Math.max(0,row.offsetTop-100);
  });
}
let htTouchStartH=-1,htTouchStartQ=-1,htTouchEndH=-1,htTouchEndQ=-1,htTouchActive=false;
function htBlockClick(h,q){
  const key=`${h}:${q}`;
  if(htSelBlocks.has(key)) htSelBlocks.delete(key); else htSelBlocks.add(key);
  renderHabitTimeGrid();
}
function htBlockTouch(e,h,q){
  e.preventDefault(); htTouchActive=true;
  htTouchStartH=h; htTouchStartQ=q; htTouchEndH=h; htTouchEndQ=q;
  htSelBlocks.clear(); htUpdateRange(); renderHabitTimeGrid();
}
function htBlockMove(e){
  if(!htTouchActive) return; e.preventDefault();
  const t=e.touches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const dh=parseInt(el?.dataset?.h),dq=parseInt(el?.dataset?.q);
  if(isNaN(dh)||isNaN(dq)||dh===htTouchEndH&&dq===htTouchEndQ) return;
  htTouchEndH=dh; htTouchEndQ=dq; htUpdateRange(); renderHabitTimeGrid();
}
function htBlockEnd(){ htTouchActive=false; }
function htUpdateRange(){
  const s=blockIndex(htTouchStartH,htTouchStartQ), e=blockIndex(htTouchEndH,htTouchEndQ);
  const lo=Math.min(s,e),hi=Math.max(s,e);
  htSelBlocks.clear();
  for(let i=lo;i<=hi;i++){const{h,q}=indexToHQ(i);htSelBlocks.add(`${h}:${q}`);}
}
function updateHtDuration(){
  const el=document.getElementById('htDuration'); if(!el) return;
  if(!htSelBlocks.size){el.innerHTML='';return;}
  const sorted=[...htSelBlocks].map(k=>{const[h,q]=k.split(':');return{h:+h,q:+q};}).sort((a,b)=>blockIndex(a.h,a.q)-blockIndex(b.h,b.q));
  const f=sorted[0],l=sorted[sorted.length-1];
  const fmt=(h,q)=>`${h}:${String(q*15).padStart(2,'0')}`;
  const eq=(l.q+1)%4,eh=l.h+(l.q===3?1:0);
  const mins=htSelBlocks.size*15,hh=Math.floor(mins/60),m=mins%60;
  el.innerHTML=`<span style="font-size:22px;font-weight:300;letter-spacing:0.02em">${fmt(f.h,f.q)}–${fmt(eh,eq)}</span><span style="display:block;font-size:13px;color:rgba(255,255,255,0.5);margin-top:2px">${hh>0?hh+'h':''}${m>0?' '+m+'m':''}</span>`;
}

/* ── EXPORT CSV ── */
function buildCSVRows(){
  const rows=[];
  // ── NAWYKI (tylko wykonane) ──
  rows.push(['=== NAWYKI ===','','','']);
  rows.push(['Data','Sektor','Habit','Wartość']);
  for(const[k,data]of Object.entries(state.daily)){
    for(const[hId,val]of Object.entries(data.habits||{})){
      if(!isDone(val)) continue;
      const h=state.habits.find(x=>x.id===hId);
      const sec=state.sectors.find(s=>s.id===h?.sectorId);
      rows.push([k,sec?.name||'',h?.name||hId,val===true?'✓':String(val)]);
    }
    for(const[eId,val]of Object.entries(data.extras||{})){
      if(!isDone(val)) continue;
      const e=(state.extraStats||[]).find(x=>x.id===eId);
      rows.push([k,'extra',e?.name||eId,val===true?'✓':String(val)]);
    }
  }
  rows.push(['','','','']);
  // ── CZAS — podsumowanie wg kategorii ──
  rows.push(['=== CZAS — KATEGORIE ===','','','','']);
  rows.push(['Data','Kategoria','Czas (min)','Czas','Zadania']);
  for(const[k,entries]of Object.entries(state.timeEntries||{})){
    const byCat={};
    for(const e of entries){
      if(e.empty) continue;
      const catId=e.catId||'_';
      if(!byCat[catId]) byCat[catId]={mins:0,labels:[]};
      byCat[catId].mins+=(e.blocks?.length||0)*15;
      if(e.label&&!byCat[catId].labels.includes(e.label)) byCat[catId].labels.push(e.label);
    }
    for(const[catId,{mins,labels}]of Object.entries(byCat)){
      const cat=(state.timeCategories||[]).find(c=>c.id===catId);
      const hh=Math.floor(mins/60),m=mins%60;
      const dur=hh>0?`${hh}h${m>0?' '+m+'m':''}`:m+'m';
      rows.push([k,cat?.name||catId,mins,dur,labels.join(', ')]);
    }
  }
  rows.push(['','']);
  // ── CZAS — szczegóły wpisów ──
  rows.push(['=== CZAS — SZCZEGÓŁY ===','','','','','']);
  rows.push(['Data','Kategoria','Zadanie','Od','Do','Min']);
  for(const[k,entries]of Object.entries(state.timeEntries||{})){
    for(const e of entries){
      if(e.empty) continue;
      const cat=(state.timeCategories||[]).find(c=>c.id===e.catId);
      const mins=(e.blocks?.length||0)*15;
      const sorted=(e.blocks||[]).slice().sort((a,b)=>blockIndex(a.h,a.q)-blockIndex(b.h,b.q));
      const tStart=sorted.length?`${sorted[0].h}:${String(sorted[0].q*15).padStart(2,'0')}`:'' ;
      const lastB=sorted[sorted.length-1];
      const endMin=lastB?(lastB.q+1)*15:0;
      const tEnd=lastB?`${lastB.h+Math.floor(endMin/60)}:${String(endMin%60).padStart(2,'0')}`:'' ;
      rows.push([k,cat?.name||'',e.label||'',tStart,tEnd,mins]);
    }
  }
  rows.push(['','']);
  // ── TASKS (wszystkie: aktywne + wykonane) ──
  rows.push(['=== TASKS ===','','','']);
  rows.push(['Status','Data','Sektor','Nazwa']);
  for(const t of (state.tempTasks||[])){
    const sec=state.sectors.find(s=>s.id===t.sectorId);
    rows.push(['aktywne',t.created||'',sec?.name||'',t.name||'']);
  }
  for(const t of (state.doneTasks||[])){
    const sec=state.sectors.find(s=>s.id===t.sectorId);
    rows.push(['wykonane',t.doneDate||'',sec?.name||'',t.name||'']);
  }
  rows.push(['','']);
  // ── MONEY ──
  rows.push(['=== WYDATKI ===','','','']);
  rows.push(['Data','Dzień','Kategoria','Kwota','Notatka']);
  const dayNames=['Nd','Pn','Wt','Śr','Cz','Pt','So'];
  const sortedMoney=[...(state.moneyEntries||[])].sort((a,b)=>a.date.localeCompare(b.date));
  for(const e of sortedMoney){
    const cat=(state.moneyCategories||[]).find(c=>c.id===e.catId);
    const d=new Date(e.date+'T00:00:00');
    rows.push([e.date,dayNames[d.getDay()],cat?.name||'',e.amount,e.note||'']);
  }
  return rows;
}

function exportCSV(){
  const rows=buildCSVRows();
  const csv=rows.map(r=>r.map(cell=>`"${String(cell||'').replace(/"/g,'""')}`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`Raport ${today()}.csv`; a.click(); URL.revokeObjectURL(url);
}
