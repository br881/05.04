<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, interactive-widget=resizes-content, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#061E0C">
<title>·</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23000000'/><circle cx='50' cy='50' r='32' stroke='white' stroke-width='5' fill='none'/><polyline points='34,50 44,62 66,38' stroke='white' stroke-width='5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23000000'/><circle cx='50' cy='50' r='32' stroke='white' stroke-width='5' fill='none'/><polyline points='34,50 44,62 66,38' stroke='white' stroke-width='5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="home" class="screen active">
  <div class="done-state" id="doneState">
    <div class="done-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 9 17 20 6"/></svg>
    </div>
  </div>
  <!-- Habits -->
  <div class="habits-scroll" id="habitsScroll">
    <div class="habits-inner">
      <div class="habits-zone" id="habitsList"></div>
    </div>
  </div>
  <!-- Week calendar view -->
  <!-- Bottom bar -->
  <div id="progressBar" onclick="openSettings()" style="cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;"><div id="pbPill"><div id="pbFill"></div></div></div>
  <div class="bottom-bar">
    <!-- Left: time tracker — clock face as ring/outline -->
    <button class="btn-ghost-zone" id="btnTime" onclick="openTimeTracker()">
      <svg width="66" height="66" viewBox="0 0 44 44" fill="none" stroke="currentColor" stroke-linecap="round">
        <circle cx="22" cy="22" r="19" stroke-width="2"/>
      </svg>
    </button>

  </div>

  <!-- Ghost tap zones -->
  <!-- Left half top → extras/habits sheet -->
  <!-- Bottom zone → settings (invisible, behind progress bar) -->
  <!-- All-done invisible settings button — full screen tap when doneState shown -->
  <div id="doneSettingsZone" onclick="openSettings()" style="position:fixed;inset:0;z-index:7;display:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;"></div>
</div>

<!-- CALENDAR PAGE — full screen landscape -->

<!-- SETTINGS -->
<div id="settings" class="screen" style="display:flex;flex-direction:column;">
  <button onclick="closeSettings()" style="position:absolute;top:calc(env(safe-area-inset-top,0px) + 10px);left:8px;width:52px;height:52px;background:none;border:none;z-index:20;cursor:pointer;opacity:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;"></button>
  <div class="settings-scroll" id="settingsScroll" style="padding-top:0"></div>
</div>



<!-- TIME TRACKER -->
<div id="timeTracker" class="screen" style="overflow:visible;">
  <div class="tt-header" style="min-height:calc(var(--safe-top)+8px)">
    <button id="ttSaveHabitBtn" onclick="saveTTHabitMode()" style="display:none;position:absolute;right:16px;top:calc(var(--safe-top)+8px);background:none;border:none;color:var(--accent);font-size:17px;font-family:inherit;cursor:pointer;padding:4px 8px">Zapisz</button>
  </div>
  <div class="tt-scroll" id="ttScroll">
    <div class="tt-grid" id="ttGrid"></div>
  </div>
  <!-- Backdrop: tap above panel to close -->
  <div id="ttEntryBackdrop" style="position:absolute;inset:0;z-index:119;display:none" onclick="closeTTEntry()"></div>
  <!-- Entry panel -->
  <div class="tt-entry-panel" id="ttEntryPanel">
    <div class="tt-entry-handle" onclick="closeTTEntry()"></div>
    <div class="tt-entry-duration" id="ttEntryDuration"></div>
    <input class="tt-entry-field" id="ttEntryField" placeholder="" autocomplete="off" autocapitalize="sentences" enterkeyhint="done" style="display:none">
    <div id="ttSuggestions" style="display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 4px;min-height:0"></div>
    <div class="tt-cat-row" id="ttCatRow"></div>
  </div>
  <!-- Bottom Zapisz — shown in habit mode after selection, same look as entry panel -->
  <div id="ttHabitSaveBar" style="display:none;position:absolute;bottom:0;left:0;right:0;padding:14px 22px calc(var(--safe-bottom)+16px);background:var(--bg);border-radius:20px 20px 0 0;border-top:none;z-index:125">
    <div class="tt-entry-handle" onclick="cancelTTHabitSelection()" style="cursor:pointer"></div>
    <div id="ttHabitDuration" class="tt-entry-duration" style="margin-bottom:12px;min-height:44px"></div>
    <button onclick="saveTTHabitMode()" class="tt-entry-save">Zapisz</button>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeAllSheets()"></div>

<!-- EXTRAS SHEET (dodatkowe habits — swipe z lewej / lewy górny) -->
<div class="sheet" id="mainSheet">
  <div class="sheet-handle" onclick="closeSheet()"></div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<div class="input-sheet" id="inputSheet">
  <div class="is-handle" onclick="closeInputSheet()"></div>
  <div class="is-label" id="inputSheetLabel"></div>
  <input class="is-field" id="inputSheetField">
  <button class="is-confirm" onclick="confirmInput()">Zapisz</button>
</div>

<!-- HABIT TIME SCREEN — opens after habit tap if trackTime enabled -->
<div id="habitTimeScreen" style="position:absolute;inset:0;background:var(--bg);transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1);z-index:200;display:flex;flex-direction:column">
  <div style="flex-shrink:0;padding:calc(var(--safe-top)+12px) 20px 12px;display:flex;align-items:center;gap:12px">
    <button class="btn-back" onclick="closeHabitTimeScreen()">‹</button>
    <span id="htHabitName" style="font-size:17px;color:rgba(255,255,255,0.7);flex:1;text-align:center"></span>
    <button onclick="saveHabitTime()" style="background:none;border:none;color:var(--accent);font-size:17px;font-family:inherit;cursor:pointer;padding:4px 8px">Zapisz</button>
  </div>
  <div id="htGrid" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:flex;align-items:center">
    <div style="width:100%;padding:0 60px 0 0" id="htGridInner"></div>
  </div>
  <div id="htDuration" style="flex-shrink:0;text-align:center;padding:12px;font-size:18px;color:#fff;min-height:44px"></div>
</div>

<!-- EXTRA TIME SCREEN — opens when extra with trackTime is tapped -->
<div id="extraTimeScreen" style="position:absolute;inset:0;background:var(--bg);transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1);z-index:201;display:flex;flex-direction:column">
  <div style="flex-shrink:0;padding:calc(var(--safe-top)+12px) 20px 12px;display:flex;align-items:center;gap:12px">
    <button class="btn-back" onclick="closeExtraTimeScreen()">‹</button>
    <span id="etHabitName" style="font-size:17px;color:rgba(255,255,255,0.7);flex:1;text-align:center"></span>
    <button onclick="saveExtraTime()" style="background:none;border:none;color:var(--accent);font-size:17px;font-family:inherit;cursor:pointer;padding:4px 8px">Zapisz</button>
  </div>
  <div id="etGrid" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:flex;align-items:center">
    <div style="width:100%;padding:0 60px 0 0" id="etGridInner"></div>
  </div>
  <div id="etDuration" style="flex-shrink:0;text-align:center;padding:12px;font-size:18px;color:#fff;min-height:44px"></div>
</div>

<!-- HABIT DETAIL -->
<div class="habit-detail-screen" id="habitDetail">
  <div class="hd-notch-bar">
    <div style="width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.12);cursor:pointer" onclick="closeHabitDetail()"></div>
  </div>
  <div class="hd-body" id="hdBody"></div>
</div>

<!-- EXTRA DETAIL -->
<div class="extra-detail-screen" id="extraDetail">
  <div class="hd-notch-bar">
    <div style="width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.12);cursor:pointer" onclick="closeExtraDetail()"></div>
  </div>
  <div class="hd-body" id="extraDetailBody"></div>
</div>

<!-- ADD EXTRA SHEET -->
<div class="input-sheet" id="extraSheet">
  <div class="is-handle" onclick="closeExtraSheet()"></div>
  <div class="is-label">Nowe pole</div>
  <input class="is-field" id="extraNameField" placeholder="" style="margin-bottom:10px">
  <div class="is-label" style="margin-top:4px">Typ</div>
  <div class="type-selector" style="margin-bottom:10px" id="extraTypePicker">
    <button class="type-btn active" onclick="setExtraType('checkbox',this)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4"/><polyline points="7 13 10 16 17 9"/></svg>
    </button>
    <button class="type-btn" onclick="setExtraType('number',this)">#</button>
    <button class="type-btn" onclick="setExtraType('text',this)">t</button>
  </div>
  <button class="is-confirm" onclick="confirmExtra()">Zapisz</button>
</div>

<script src="app.js" defer></script>
</body>
</html>
