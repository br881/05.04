<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#061E0C">
<title>·</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='#061E0C'/><circle cx='50' cy='50' r='32' stroke='white' stroke-width='6' fill='none'/></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='#061E0C'/><circle cx='50' cy='50' r='32' stroke='white' stroke-width='6' fill='none'/></svg>">
<style>
:root{
  --bg:#061E0C;--bg2:#0d0d0d;--tile:#181818;--tile2:#141414;--tile-border:rgba(255,255,255,0.07);
  --accent:#3ddd65;--accent-dim:rgba(61,221,101,0.45);--accent-border:rgba(61,221,101,0.7);--accent-bright:#ffffff;
  --white:#e8e8e8;--ui:rgba(232,232,232,0.52);--ui2:rgba(232,232,232,0.32);
  --red:#e05555;--sep:rgba(255,255,255,0.06);--radius:16px;
  --safe-top:env(safe-area-inset-top,44px);--safe-bottom:env(safe-area-inset-bottom,20px);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,html,body{background:var(--bg);color:#ffffff;font-family:-apple-system,'SF Pro Text',BlinkMacSystemFont,sans-serif;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;font-weight:400;}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* SCREENS */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .55s cubic-bezier(.16,1,.3,1);background:var(--bg);overflow:hidden;}
.screen.active{transform:translateX(0);}
.screen.slide-out{transform:translateX(-28%);}
#home{transform:translateX(0);}

/* HOME LAYOUT */
.habits-scroll{position:absolute;top:calc(var(--safe-top) + 18px);bottom:calc(var(--safe-bottom) + 90px);left:0;right:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:flex;flex-direction:column;justify-content:center;}
.habits-scroll::-webkit-scrollbar{display:none;}
.habits-inner{width:100%;max-width:500px;margin:0 auto;padding:calc(var(--safe-top) + 28px) 28px calc(var(--safe-bottom) + 155px);box-sizing:border-box;}
.habits-zone{display:flex;flex-direction:column;gap:0;}
.habits-zone-spacer-top,.habits-zone-spacer-bottom,.temps-zone{display:none;}

/* TEMPS TRAY */
.temps-tray{position:fixed;left:0;right:0;bottom:calc(var(--safe-bottom) + 90px);z-index:5;display:none;flex-direction:column;align-items:center;max-height:90px;overflow:hidden;transition:max-height .5s cubic-bezier(.34,1.2,.64,1);}
.temps-tray.expanded{max-height:65dvh;}
.temps-tray::before{content:'';position:fixed;inset:0;bottom:0;background:rgba(0,0,0,0.82);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:-1;opacity:0;pointer-events:none;transition:opacity .4s ease;}
.temps-tray.expanded::before{opacity:1;pointer-events:all;}
.temps-tray-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.22);margin-bottom:12px;cursor:pointer;flex-shrink:0;}
.temps-tray-inner{width:100%;max-width:500px;padding:0 28px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
.temps-tray-inner::-webkit-scrollbar{display:none;}

/* HABIT TILE */
.habit-row{display:flex;align-items:center;gap:16px;padding:18px 26px 18px 28px;margin-bottom:10px;background:rgba(255,255,255,0.32);border:none;border-radius:var(--radius);cursor:pointer;will-change:opacity,transform;transition:opacity .3s ease;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}

.habit-row.row-enter{opacity:0;transform:translateY(6px);}
.habit-row.row-visible{opacity:1;transform:translateY(0);transition:opacity .32s ease,transform .32s cubic-bezier(.2,.8,.4,1);}
.habit-row:active{opacity:.55;}
.habit-row.dimmed{opacity:.22;transition:opacity .4s ease;}
.habit-row.vanishing{overflow:hidden;pointer-events:none;box-shadow:none!important;animation:none!important;will-change:opacity,height,margin-bottom;transition:opacity .42s ease-out,height .48s cubic-bezier(.4,0,.2,1),margin-bottom .48s cubic-bezier(.4,0,.2,1);}
.habit-row.temp-row .habit-name{color:rgba(120,235,120,1);font-weight:500;}
.habit-name{font-size:21px;font-weight:400;color:#ffffff;letter-spacing:-.02em;flex:1;user-select:none;text-align:center;}
.habit-value-input{background:none;border:none;border-bottom:2px solid rgba(255,255,255,0.38);color:#ffffff;font-size:17px;font-family:inherit;outline:none;width:72px;text-align:right;padding:2px 0 4px;transition:border-color .2s;font-weight:600;}
.habit-value-input:focus{border-bottom-color:var(--accent-border);}
.habit-value-input::placeholder{color:transparent;}

/* HABIT GROUPS SEPARATOR */
.group-sep{height:16px;flex-shrink:0;}

/* DONE STATE */
.done-state{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .8s cubic-bezier(.16,1,.3,1);}
.done-state.show{opacity:1;}
@keyframes pbShimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
@keyframes pbPop{0%{transform:scaleY(1);}40%{transform:scaleY(1.6);}70%{transform:scaleY(0.85);}100%{transform:scaleY(1);}}
.pb-fill.pop{animation:pbPop .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(10px);}100%{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes toastOut{0%{opacity:1;}100%{opacity:0;transform:translateX(-50%) translateY(8px);}}
@keyframes doneMarkFade{0%{opacity:0;transform:scale(.85);}100%{opacity:1;transform:scale(1);}}
@keyframes checkDraw{0%{stroke-dashoffset:90;}100%{stroke-dashoffset:0;}}
.done-mark{display:flex;align-items:center;justify-content:center;opacity:0;}
.done-state.show .done-mark{animation:doneMarkFade 1s .1s cubic-bezier(.16,1,.3,1) forwards;}
.done-mark svg{color:#4ade80;width:77px;height:77px;stroke-dasharray:90;stroke-dashoffset:90;opacity:1;}
.done-state.show .done-mark svg{animation:checkDraw 2.8s .15s cubic-bezier(.4,0,.01,1) forwards;}

/* ADD TEMP overlay */
.temp-overlay{position:fixed;inset:0;z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0 16px 24px;opacity:0;pointer-events:none;transition:opacity .22s ease;}
.temp-overlay.open{opacity:1;pointer-events:all;}
.temp-overlay-blur{position:absolute;inset:0;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(0,0,0,0.78);}
.temp-card{position:relative;z-index:1;width:100%;max-width:440px;margin:0 auto;background:none;border:none;border-radius:0;padding:0;display:flex;flex-direction:column;gap:18px;align-items:center;}
.temp-card-field{width:100%;background:rgba(255,255,255,0.32);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:none;border-radius:14px;padding:16px 18px;color:#ffffff;font-size:21px;font-weight:400;font-family:inherit;outline:none;transition:background .2s;text-align:center;letter-spacing:-.02em;}
.temp-card-field:focus{border-color:var(--accent-border);}
.temp-card-sectors{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.sector-pill{padding:8px 16px;border-radius:20px;border:none;background:rgba(255,255,255,0.05);color:var(--ui);font-size:14px;cursor:pointer;font-family:inherit;transition:all .15s;}
.sector-pill.active{background:rgba(61,221,101,0.45);border:none;color:#fff;font-weight:600;}

/* BOTTOM BAR — buttons at 1/3 and 2/3 */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--safe-bottom) + 110px);
  z-index:10;pointer-events:none;
}
.btn-ghost-zone{
  position:absolute;
  width:88px;height:88px;border-radius:50%;
  background:none;
  border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;pointer-events:all;
  color:rgba(255,255,255,0.8);
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  bottom:calc(var(--safe-bottom) + 36px);
  transform:translateX(-50%);
}
#btnTime{ left:50%; }
.btn-ghost-zone:active{color:#fff;opacity:.6;}


/* ── SOLO LEVELING EFFECT ── */
@keyframes slGateOpen{0%{transform:scale(0.2) rotate(-15deg);opacity:0;filter:brightness(3);}30%{opacity:1;filter:brightness(2);}70%{transform:scale(1.15) rotate(3deg);opacity:0.9;}100%{transform:scale(1) rotate(0deg);opacity:0;}}
@keyframes slRune{0%{opacity:0;transform:translate(-50%,-50%) scale(0) rotate(0deg);}25%{opacity:1;filter:drop-shadow(0 0 8px #60a5fa);}60%{transform:translate(-50%,-50%) scale(1.2) rotate(180deg);opacity:0.8;}100%{transform:translate(-50%,-50%) scale(0.3) rotate(360deg);opacity:0;}}
@keyframes slPortal{0%{transform:translate(-50%,-50%) scale(0);opacity:0;}20%{opacity:1;}70%{transform:translate(-50%,-50%) scale(1);opacity:0.7;}100%{transform:translate(-50%,-50%) scale(1.4);opacity:0;}}
@keyframes slRipple{0%{transform:scale(1);opacity:0.9;box-shadow:0 0 0 0 rgba(96,165,250,0.8),inset 0 0 20px rgba(96,165,250,0.3);}100%{transform:scale(2.8);opacity:0;box-shadow:0 0 0 20px rgba(96,165,250,0),inset 0 0 0 rgba(96,165,250,0);}}
@keyframes slFlash{0%{opacity:0;}15%{opacity:0.35;background:rgba(96,165,250,0.15);}100%{opacity:0;background:transparent;}}
.reward-ripple{position:absolute;inset:0;border-radius:inherit;border:1.5px solid rgba(96,165,250,0.9);animation:slRipple .55s ease-out forwards;pointer-events:none;box-shadow:0 0 12px rgba(96,165,250,0.5),inset 0 0 12px rgba(96,165,250,0.1);}
.habit-row.reward-pop{animation:slFlash .4s ease-out forwards;}
/* OVERLAY */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0);pointer-events:none;transition:background .3s;}
.overlay.open{background:rgba(0,0,0,.8);pointer-events:all;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}

/* SHEET */
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:101;background:#111;border-radius:20px 20px 0 0;border:none;transform:translateY(100%);transition:transform .36s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;max-height:88dvh;padding-bottom:var(--safe-bottom);}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:34px;height:4px;border-radius:2px;background:rgba(255,255,255,0.1);margin:10px auto 0;flex-shrink:0;cursor:pointer;}
.sheet-body{flex:1;overflow-y:auto;padding:12px 22px 20px;scrollbar-width:none;}
.sheet-body::-webkit-scrollbar{display:none;}

/* INPUT SHEET */
.input-sheet{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#111;border-radius:20px 20px 0 0;border:none;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);padding:12px 22px calc(var(--safe-bottom)+16px);}
.input-sheet.open{transform:translateY(0);}
.is-handle{width:34px;height:4px;border-radius:2px;background:rgba(255,255,255,0.1);margin:0 auto 14px;}
.is-label{font-size:14px;color:var(--ui);margin-bottom:8px;opacity:.7;font-weight:400;}
.is-field{width:100%;background:rgba(255,255,255,0.32);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:none;border-radius:14px;padding:16px 18px;color:#ffffff;font-size:21px;font-weight:400;font-family:inherit;outline:none;transition:background .2s;text-align:center;letter-spacing:-.02em;}
.is-field:focus{background:rgba(255,255,255,0.38);}
.is-confirm{width:100%;margin-top:10px;background:rgba(61,221,101,0.55);color:#fff;font-size:17px;font-weight:600;border:none;border-radius:12px;padding:14px;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.is-confirm:active{opacity:.7;}
.extras-done{display:flex;align-items:center;justify-content:center;padding:32px 0;}
.extras-done svg{color:#4ade80;opacity:1;}

/* SETTINGS */
.settings-header{position:relative;top:0;left:0;z-index:10;padding:calc(var(--safe-top)+4px) 0 0 4px;flex-shrink:0;}
.btn-back{display:flex;align-items:center;justify-content:center;width:48px;height:48px;background:none;border:none;color:var(--accent);font-size:28px;cursor:pointer;opacity:.7;line-height:1;}
.btn-back:active{opacity:1;}
.settings-scroll{flex:1;overflow-y:auto;scrollbar-width:none;padding-top:16px;padding-bottom:calc(var(--safe-bottom)+40px);}
.settings-scroll::-webkit-scrollbar{display:none;}
.s-section{padding:0 18px;margin-top:20px;}
.s-section-title{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ui);margin-bottom:10px;padding:0 4px;opacity:.5;display:flex;align-items:center;justify-content:center;gap:6px;}

/* SECTOR BLOCK */
.sector-block{margin-bottom:28px;}
.sector-block-header{display:flex;align-items:center;justify-content:center;padding:10px 4px;cursor:pointer;transition:opacity .15s;}
.sector-block-header:active{opacity:.6;}
.sbn{font-size:18px;color:#ffffff;font-weight:400;}
.sector-habits-box{margin-top:6px;background:rgba(255,255,255,0.32);border-radius:12px;overflow:hidden;padding:2px 0;}
.sector-habit-row{display:flex;align-items:center;justify-content:center;gap:10px;padding:11px 16px;cursor:grab;touch-action:none;transition:opacity .15s;user-select:none;-webkit-user-select:none;position:relative;}
.sector-habit-row:active{opacity:.5;cursor:grabbing;}
.shr-name{font-size:18px;color:#ffffff;font-weight:400;text-align:center;}
.add-habit-row{display:flex;align-items:center;justify-content:center;padding:10px 4px;color:rgba(255,255,255,0.35);cursor:pointer;touch-action:auto;transition:opacity .15s;background:transparent!important;}
.add-habit-row:active{opacity:.8;}
.add-sector-btn-icon{display:flex;align-items:center;justify-content:center;width:100%;padding:12px;border-radius:12px;border:none;background:none;color:rgba(255,255,255,0.3);cursor:pointer;transition:all .15s;}
.add-sector-btn-icon:active{opacity:.8;}

/* SECTOR EDIT PANEL */
.sector-edit-panel{display:none;}
.sector-block.expanded .sector-edit-panel{display:block;}
.sector-edit-card{background:rgba(255,255,255,0.13);border-radius:14px;padding:16px;margin-bottom:10px;}
.sec-name-input{display:block;width:100%;background:none;border:none;border-bottom:1px solid rgba(255,255,255,0.25);color:#ffffff;font-size:21px;font-weight:400;font-family:inherit;outline:none;padding:4px 0 8px;text-align:center;margin-bottom:18px;}
.sec-name-input:focus{border-bottom-color:var(--accent-border);}
.sec-schedule-list{display:flex;flex-direction:column;gap:14px;}
.sec-schedule-row{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px;background:rgba(255,255,255,0.12);border-radius:10px;}
.sec-time-line{display:flex;align-items:center;gap:5px;justify-content:center;}
.sec-days-line{display:flex;gap:4px;justify-content:center;}
.time-input{background:rgba(255,255,255,0.12);border:none;border-radius:8px;padding:7px 8px;color:#ffffff;font-size:15px;font-weight:600;font-family:inherit;outline:none;width:52px;text-align:center;transition:background .2s;}
.time-input:focus{background:rgba(255,255,255,0.2);}
.time-colon{color:var(--ui);opacity:.5;font-size:15px;}
.time-dash{color:var(--ui);opacity:.35;font-size:13px;padding:0 2px;}
.day-mini-btn{width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,0.05);color:var(--ui);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.day-mini-btn.on{background:var(--accent-dim);color:var(--accent-bright);}
.del-sched-btn{width:22px;height:22px;background:none;border:none;color:var(--ui);opacity:.25;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:opacity .15s;flex-shrink:0;}
.del-sched-btn:active{opacity:.8;color:var(--red);}
.add-schedule-wrap{display:flex;justify-content:center;margin-top:10px;}
.add-schedule-btn{width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s;}
.add-schedule-btn:active{opacity:.9;}
.sector-actions-row{display:flex;gap:10px;margin-top:12px;justify-content:center;}
.sec-act-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 28px;border-radius:12px;background:rgba(255,255,255,0.05);border:none;font-size:15px;font-weight:400;font-family:inherit;cursor:pointer;transition:all .15s;color:var(--ui);}
.sec-act-btn.danger{color:var(--red);background:rgba(224,85,85,0.07);}
.sec-act-btn.save-ico{color:var(--accent-bright);background:var(--accent-dim);}
.sec-act-btn:active{opacity:.6;}

/* BOTTOM ICON ROW */
.bottom-icon-row{display:flex;gap:10px;margin-top:8px;}
.bic-btn{flex:1;display:flex;align-items:center;justify-content:center;padding:13px 8px;border-radius:14px;background:rgba(255,255,255,0.05);border:none;cursor:pointer;font-family:inherit;transition:all .15s;color:#ffffff;}
.bic-btn:active{opacity:.6;}
.bic-btn.open-state{background:var(--accent-dim);color:var(--accent-bright);}
.bic-btn svg{width:17px;height:17px;}

/* SETTINGS PANEL ROWS */
.s-panel-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 6px;
  cursor:pointer;
  transition:opacity .15s;
  
}
.s-panel-row:last-child{border-bottom:none;}
.s-panel-row:active{opacity:.6;}
.s-panel-row.open .s-panel-label{color:var(--accent-bright);}
.s-panel-row.open .s-panel-chevron{transform:rotate(90deg);}
.s-panel-label{font-size:15px;color:rgba(255,255,255,0.6);font-weight:400;}
.s-panel-chevron{display:flex;align-items:center;color:rgba(255,255,255,0.25);transition:transform .2s;}
.s-panel-body{
  padding:6px 0 12px;
  
  margin-bottom:2px;
}

/* SETTINGS LOCK BUTTON at bottom */
.settings-lock-btn{
  position:fixed;bottom:calc(var(--safe-bottom)+20px);right:20px;
  z-index:5;
  width:44px;height:44px;border-radius:50%;
  background:none;border:none;
  color:rgba(255,255,255,0.18);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .2s;
  pointer-events:all;
}
.settings-lock-btn:active{opacity:.7;}

/* PANELS */
.panel-wrap{background:rgba(255,255,255,0.03);border:none;border-radius:var(--radius);overflow:hidden;margin-top:10px;}
.done-task-row{display:flex;align-items:center;padding:10px 14px;}
.dt-name{flex:1;font-size:14px;color:rgba(232,232,232,0.45);}
.done-clear-btn{width:100%;padding:10px;margin-top:8px;background:rgba(224,85,85,0.06);border:none;border-radius:var(--radius);font-size:13px;font-family:inherit;cursor:pointer;color:rgba(224,85,85,0.45);display:flex;align-items:center;justify-content:center;gap:6px;}
.done-clear-btn:active{opacity:1;background:rgba(224,85,85,0.07);color:var(--red);}

/* STREAK panel — last 7 days, day-number only */
.streak-sector-pills{display:flex;}
.streak-pill{flex:1;padding:9px 8px;border:none;background:none;color:var(--ui);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;}
.streak-pill:last-child{border-right:none;}
.streak-pill.active{background:var(--accent-dim);color:var(--accent-bright);}
.streak-list{display:flex;flex-direction:column;gap:10px;padding:12px 14px;}
.streak-row{display:flex;align-items:center;gap:10px;}
.srn{font-size:12px;color:var(--ui);width:70px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.streak-bar-wrap{flex:1;position:relative;height:20px;display:flex;align-items:center;gap:2px;}
.streak-day-dot{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.07);position:relative;}
.streak-day-dot.done{background:rgba(52,199,89,0.5);}
.streak-day-dot.done.today{background:rgba(52,199,89,0.9);}
.streak-day-num{position:absolute;bottom:-11px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(255,255,255,0.2);white-space:nowrap;}
.streak-count{font-size:11px;color:var(--accent);font-weight:600;min-width:20px;text-align:right;opacity:.7;}
.streak-dots-header{display:flex;gap:2px;padding:0 14px 4px;margin-top:6px;}
.streak-dot-label{flex:1;text-align:center;font-size:9px;color:rgba(255,255,255,0.2);}

.empty{display:flex;align-items:center;justify-content:center;padding:16px;}
.empty-text{font-size:12px;color:var(--ui);opacity:.4;}

/* DONE STATE — tasks (niebieski) */
.done-state-tasks{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .4s ease;}
.done-state-tasks.show{opacity:1;}

.url-input:focus{background:rgba(255,255,255,0.38);}

.arch-toggle-row{display:flex;align-items:center;gap:8px;flex-shrink:0;}

.toggle{width:44px;height:26px;border-radius:13px;background:rgba(255,255,255,0.08);border:none;position:relative;cursor:pointer;transition:background .22s;flex-shrink:0;}

.hd-spacer{flex:1;min-height:20px;}
.save-btn{width:100%;background:#1a7a3a;color:#fff;font-size:16px;font-weight:600;border:none;border-radius:12px;padding:15px;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.save-btn:active{opacity:.7;}
.delete-btn{width:100%;background:none;border:none;padding:14px;margin-top:4px;color:rgba(224,85,85,0.5);font-size:14px;font-family:inherit;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;border-radius:12px;}
.delete-btn:active{color:var(--red);}
.delete-btn.confirm-pending{color:#fff;background:rgba(224,85,85,0.85);border-radius:12px;}
.sec-act-btn.danger.confirm-pending{color:#fff;background:rgba(224,85,85,0.85);}

.extra-detail-screen{position:fixed;inset:0;z-index:301;background:var(--bg);transform:translateY(100%);transition:transform .38s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;overflow:hidden;}

.type-btn.active{background:var(--accent-dim);color:var(--accent-bright);}

.hd-name-input:focus{background:rgba(255,255,255,0.42);}
.hd-name-input::placeholder{color:rgba(255,255,255,0.28);}

   TIME TRACKER SCREEN
══════════════════════════════════════════ */
#timeTracker{background:var(--bg);} #home{background:var(--bg);} #settingsPanel{background:var(--bg);}
.tt-header{
  position:absolute;top:0;left:0;z-index:10;
  padding:calc(var(--safe-top)+4px) 0 0 4px;
}
.tt-scroll{
  position:absolute;inset:0;
  padding-top:calc(var(--safe-top)+52px);
  padding-bottom:calc(var(--safe-bottom)+160px);
  padding-right:60px;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  display:flex;
  flex-direction:column;
}
.tt-scroll::-webkit-scrollbar{display:none;}
.tt-grid{
  width:100%;
  padding:0;
  display:flex;flex-direction:column;
  gap:0;
  min-height:100%;
  justify-content:flex-start;
}
/* Each row = 1 hour, 4 blocks of 15min */
.tt-hour-label{
  width:44px;flex-shrink:0;
  display:flex;align-items:center;justify-content:flex-end;
  padding-right:10px;
  font-size:15px;font-weight:600;
  color:rgba(255,255,255,0.9);
  letter-spacing:-.01em;
  user-select:none;
}
.tt-blocks{
  flex:1;
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:0;padding:0;
}
/* Square blocks */
.tt-block{
  width:100%;
  background:rgba(255,255,255,0.32);
  border:none;border-radius:0;
  cursor:pointer;
  transition:background .12s,opacity .1s;
  position:relative;
  user-select:none;-webkit-user-select:none;
  touch-action:none;
  overflow:visible;
}
.tt-block:before{
  content:'';display:block;

}
.tt-block:active{opacity:.7;}
.tt-block.selecting{background:rgba(61,221,101,0.65)!important;}
/* Filled block: black */
.tt-block.filled{background:var(--bg);border:none;pointer-events:all;cursor:pointer;overflow:visible;}
.tt-block.filled:active{opacity:.7;}
.tt-block.filled::after{display:none;}
/* Hour ruler tick — appears at bottom of every hour row */
.tt-hour-tick{
  position:absolute;bottom:0;left:0;
  width:100%;height:2px;
  display:flex;align-items:flex-end;
}
.tt-hour-row{
  display:flex;align-items:stretch;

}

}
.tt-entry-panel.open{transform:translateY(0);}

.tt-entry-duration{

  text-align:center;margin-bottom:12px;

}
.tt-entry-field{
  width:100%;background:rgba(255,255,255,0.32);

  border:none;
  border-radius:14px;padding:16px 18px;
  color:#ffffff;font-size:21px;font-weight:400;
  font-family:inherit;
  outline:none;transition:background .2s;margin-bottom:12px;
  text-align:center;letter-spacing:-.02em;
}
.tt-entry-field:focus{background:rgba(255,255,255,0.38);}
.tt-cat-row{
  display:flex;gap:8px;
  margin-bottom:12px;justify-content:space-between;align-items:center;
}
.tt-cat-pill{
  padding:7px 14px;border-radius:20px;

}
.tt-cat-pill.active{background:var(--accent-dim);color:var(--accent-bright);}
.tt-entry-save{
  width:100%;background:var(--accent-dim);color:var(--white);
  font-size:16px;font-weight:400;border:none;
  border-radius:12px;padding:14px;cursor:pointer;
  font-family:inherit;transition:opacity .15s;
}
.tt-entry-save:active{opacity:.7;}

/* TEMP ADD BTN in sheet */
.temp-add-btn{
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:none;
  color:rgba(255,255,255,0.6);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
}
.temp-add-btn:active{background:rgba(255,255,255,0.14);color:rgba(255,255,255,0.9);}

/* LOCK TRIGGER — centered gray icon */
.s-lock-trigger{
  width:44px;height:44px;border-radius:50%;
  background:none;border:none;
  color:rgba(255,255,255,0.22);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:color .2s;
}
.s-lock-trigger:active{color:rgba(255,255,255,0.4);}
.s-lock-trigger.s-lock-open{color:rgba(255,255,255,0.35);}

/* LOCK PANEL */
.s-lock-panel{
  margin-top:8px;
  background:rgba(255,255,255,0.03);
  border:none;
  border-radius:14px;
  overflow:hidden;
  padding:0;
}

/* SETTINGS PANEL ROWS */
.s-panel-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 16px;
  cursor:pointer;
  border:none;
  transition:background .15s;
  background:rgba(255,255,255,0.04);
}
.s-panel-row:active{background:rgba(255,255,255,0.08);}
.s-panel-row.s-panel-open{background:rgba(255,255,255,0.06);}
.s-panel-label{font-size:15px;color:#ffffff;font-weight:400;}
.s-panel-icon{color:rgba(255,255,255,0.45);display:flex;align-items:center;}
.s-panel-chevron{display:none;}
.s-panel-body{padding:12px 16px 14px;}

/* Time categories settings in settings panel */
.tt-cats-box{background:rgba(255,255,255,0.14);border-radius:12px;overflow:hidden;padding:2px 0;margin-bottom:10px;}
.tt-cat-setting-row{display:flex;align-items:center;gap:10px;padding:11px 16px;}
.tt-cat-s-name{flex:1;font-size:17px;color:#ffffff;font-weight:400;}
/* PROGRESS BAR */
#progressBar{
  position:fixed;
  top:calc(var(--safe-top) + 4px);
  left:calc(33.33% - 18px);
  right:calc(33.33% - 18px);
  z-index:11;pointer-events:none;
  opacity:0;transition:opacity .35s;
  height:9px;
}
#progressBar.visible{opacity:1;}
#pbPill{
  width:100%;height:100%;
  border-radius:5px;
  background:rgba(255,255,255,0.32);

  position:relative;
}
#pbFill{
  position:absolute;left:0;top:0;bottom:0;
  border-radius:5px;
  background:rgba(61,221,101,0.75);
  transition:width .55s cubic-bezier(.34,1.2,.64,1);
  width:0%;
}
</style>

<body>

<script>

function defaultState(){
  return{
    sectors:[
      {id:'s1',name:'💼',schedules:[{startH:8,startM:0,endH:16,endM:0,weekdays:[0,1,2,3,4]}]},
      {id:'s2',name:'🏠',schedules:[{startH:17,startM:0,endH:21,endM:0,weekdays:[0,1,2,3,4]}]},
      {id:'sw',name:'☀️',schedules:[{startH:8,startM:0,endH:22,endM:0,weekdays:[5,6]}]},
    ],
    habits:[],
      daily:{},streaks:{},streakSectorId:'s1',
    _doneOpen:false,_streakOpen:false,_archiveOpen:false,_lockOpen:false,_csvOpen:false,_csvSectorId:null,_timeStatsOpen:false,_statsOpen:true,_settingsOpen:false,_timePeriod:'week',
    timeEntries:{}, // keyed by date → array of {id,label,isWork:bool,blocks:[{h,q}]}
  };
}

function migrateState(s){
  const nm={'Praca':'💼','Dom':'🏠','Weekend':'☀️'};
  for(const sec of s.sectors){
    if(nm[sec.name]) sec.name=nm[sec.name];
    if(!sec.schedules) sec.schedules=[{startH:sec.startH||8,startM:sec.startM||0,endH:sec.endH||17,endM:sec.endM||0,weekdays:sec.weekdays||[0,1,2,3,4]}];
  }
  for(const h of s.habits){
    if(h.paused!==undefined&&h.archived===undefined){ h.archived=h.paused; delete h.paused; }
    if(h.order===undefined) h.order=0;
  }
  for(const e of (s.extraStats||[])){
    if(e.order===undefined) e.order=0;
    if(e.url===undefined) e.url='';
    if(e.trackTime===undefined) e.trackTime=false;
    if(e.trackCatId===undefined) e.trackCatId=null;
  }
  s._doneOpen=false; s._streakOpen=false; s._archiveOpen=false; s._timeStatsOpen=false;
  if(!s._lockOpen) s._lockOpen=false;
  if(!s._csvOpen) s._csvOpen=false;
  if(!s._csvSectorId) s._csvSectorId=null;
  if(s._statsOpen===undefined) s._statsOpen=true;   // default stats open
  if(s._settingsOpen===undefined) s._settingsOpen=false; // default settings closed
  if(!s.timeEntries) s.timeEntries={};
  // Migrate old catId-based entries: 💼 cat = isWork true
  for(const entries of Object.values(s.timeEntries||{})){
    for(const e of entries){
      if(e.isWork===undefined){
        e.isWork=!!(e.catId&&(s.timeCategories||[]).find(c=>c.id===e.catId)?.name==='💼');
      }
    }
  }
  return s;
}

let state;
try{ const r=localStorage.getItem('hs9'); state=r?migrateState(JSON.parse(r)):defaultState(); }catch{ state=defaultState(); }
let _saveTimer=null;
function save(){
  // Debounce rapid saves (e.g. during animations)
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    _saveTimer=null;
    // Archive timeEntries older than 60 days
    const now=new Date();
    if(state.timeEntries){
      for(const dk of Object.keys(state.timeEntries)){
        const d=new Date(dk+'T00:00:00');
        if((now-d)/(864e5)>90){ delete state.timeEntries[dk]; }
      }
    }
    try{ localStorage.setItem('hs9',JSON.stringify(state)); }catch{}
  },60);
}
function saveNow(){
  if(_saveTimer){ clearTimeout(_saveTimer); _saveTimer=null; }
  if(state.timeEntries){ const now=new Date(); for(const dk of Object.keys(state.timeEntries)){ const d=new Date(dk+'T00:00:00'); if((now-d)/(864e5)>90) delete state.timeEntries[dk]; } }
  try{ localStorage.setItem('hs9',JSON.stringify(state)); }catch{}
}

function today(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function jsDay(){ const d=new Date().getDay(); return d===0?6:d-1; }
function fmtDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function getDayData(){ const k=today(); if(!state.daily[k]) state.daily[k]={habits:{},extras:{},temps:{}}; return state.daily[k]; }
function isDone(v){ return v!==undefined&&v!==null&&v!==false&&v!==''; }

function getActiveSector(){
  const now=new Date(); const cur=now.getHours()*60+now.getMinutes(); const jsd=jsDay();
  for(const s of state.sectors)
    for(const sc of (s.schedules||[]))
      if(sc.weekdays.includes(jsd)&&cur>=sc.startH*60+sc.startM&&cur<sc.endH*60+sc.endM) return s;
  return null;
}

function spawnConfetti(cx,cy){ rewardEffect(cx,cy); }

  const rows=document.querySelectorAll('.habit-row.tapping,.habit-row.done-glow');
  rows.forEach(row=>{
    row.classList.add('reward-pop');
    const rip=document.createElement('div');
    rip.className='reward-ripple';
    row.appendChild(rip);
    rip.addEventListener('animationend',()=>rip.remove(),{once:true});
    row.addEventListener('animationend',()=>row.classList.remove('reward-pop'),{once:true});
    const rect=row.getBoundingClientRect();
    const ox=cx||rect.right-18, oy=cy||rect.top+10;
    // Gate portal — blue hexagon
    const portal=document.createElement('div');
    portal.style.cssText=`position:fixed;left:${ox}px;top:${oy}px;width:44px;height:44px;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)`;
    const psvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    psvg.setAttribute('viewBox','0 0 44 44');
    psvg.setAttribute('width','44');psvg.setAttribute('height','44');
    psvg.style.cssText='animation:slPortal .5s ease-out forwards;filter:drop-shadow(0 0 6px #3b82f6)';
    psvg.innerHTML=`<polygon points="22,2 38,11 38,33 22,42 6,33 6,11" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.9"/><polygon points="22,8 33,14 33,30 22,36 11,30 11,14" fill="rgba(59,130,246,0.18)" stroke="#93c5fd" stroke-width="1"/>`;
    portal.appendChild(psvg);
    document.body.appendChild(portal);
    portal.addEventListener('animationend',()=>portal.remove(),{once:true});
    // Runes — 5 small glyphs
    const runeChars=['ᚱ','ᚢ','ᚾ','ᛖ','ᛗ'];
    const colors=['#60a5fa','#93c5fd','#3b82f6','#bfdbfe','#dbeafe'];
    for(let i=0;i<5;i++){
      const ang=(i/5)*Math.PI*2-(Math.PI/2);
      const r=28+Math.random()*14;
      const rx=ox+Math.cos(ang)*r, ry=oy+Math.sin(ang)*r;
      const rune=document.createElement('div');
      rune.textContent=runeChars[i];
      rune.style.cssText=`position:fixed;left:${rx}px;top:${ry}px;font-size:${10+Math.random()*6}px;color:${colors[i]};pointer-events:none;z-index:9999;transform:translate(-50%,-50%) scale(0) rotate(0deg);animation:slRune ${0.4+Math.random()*0.25}s ${i*0.04}s ease-out forwards;text-shadow:0 0 8px ${colors[i]};font-weight:700;`;
      document.body.appendChild(rune);
      rune.addEventListener('animationend',()=>rune.remove(),{once:true});
    }
    // Gate flash overlay on row
    const flash=document.createElement('div');
    flash.style.cssText=`position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:1;animation:slFlash .35s ease-out forwards;`;
    row.style.position='relative';
    row.appendChild(flash);
    flash.addEventListener('animationend',()=>flash.remove(),{once:true});
  });
}
function updateProgressBar(){
  const pb=document.getElementById('progressBar');
  const fill=document.getElementById('pbFill');
  if(!pb||!fill) return;
  const today_=today();
  const d=new Date(today_+'T00:00:00');
  const jsd=d.getDay()===0?6:d.getDay()-1;
  const sector=getActiveSector();
  const habits=(state.habits||[]).filter(h=>!h.archived&&h.sectorId===sector?.id&&(h.days||[]).includes(jsd));
  const dd=state.daily?.[today_]?.habits||{};
  const _done=habits.filter(h=>isDone(dd[h.id])).length;
  const _total=habits.length;
  if(_total===0||_done===_total){ pb.classList.remove('visible'); return; }
  pb.classList.add('visible');
  fill.style.width=Math.round(_done/_total*100)+'%';
}


function renderHome(){
  const sector=getActiveSector();
  const hList=document.getElementById('habitsList');
  setTimeout(updateProgressBar,0);
  const ds=document.getElementById('doneState');
  if(!hList) return;

  if(!sector){
    Array.from(hList.children).forEach(r=>{ r.style.maxHeight=r.offsetHeight+'px'; r.classList.add('vanishing'); });
    setTimeout(()=>{ hList.innerHTML=''; ds.classList.add('show'); },420);
    return;
  }
  const dd=getDayData(); const jsd=jsDay();
  const habits=state.habits.filter(h=>h.sectorId===sector.id&&!h.archived&&h.days.includes(jsd));
  habits.sort((a,b)=>(a.order||0)-(b.order||0));
  const remaining=habits.filter(h=>!isDone(dd.habits[h.id]));


  if(remaining.length===0){
    Array.from(hList.children).forEach(r=>{ r.style.maxHeight=r.offsetHeight+'px'; r.classList.add('vanishing'); });
    setTimeout(()=>{ hList.innerHTML=''; ds.classList.add('show'); },400);
    const dz=document.getElementById('doneSettingsZone');
    if(dz) dz.style.display='block';
    return;
  }
  ds.classList.remove('show');

  const dz=document.getElementById('doneSettingsZone');
  if(dz) dz.style.display='none';

  function diffZone(container, items, makeRow){
    Array.from(container.children).forEach(row=>{
      if(!items.find(it=>it.key===row.dataset.key)){
        row.style.maxHeight=row.offsetHeight+'px';
        row.classList.add('vanishing');
        row.addEventListener('transitionend',()=>row.remove(),{once:true});
      }
    });
    items.forEach((item,i)=>{
      let row=container.querySelector(`[data-key="${item.key}"]`);
      if(!row){
        row=makeRow(item); row.dataset.key=item.key;
        container.insertBefore(row,container.children[i]||null);
        requestAnimationFrame(()=>requestAnimationFrame(()=>row.classList.replace('row-enter','row-visible')));
      } else {
        if(row!==container.children[i]) container.insertBefore(row,container.children[i]||null);
        row.classList.remove('dimmed');
      }
    });
  }

  diffZone(hList, remaining.map(h=>({key:'h'+h.id,h})), item=>{
    const h=item.h, row=document.createElement('div');
    row.id='row-'+h.id; row.className='habit-row row-enter';
    row.onclick=()=>handleHabitTap(h.id);
    if(h.trackTime && (h.type==='number'||h.type==='text')){
      // trackTime + number/text: show input field, tap row → ask value then open TT
      row.innerHTML=`<span class="habit-name" style="flex:1">${h.name}</span><input class="habit-value-input" type="${h.type==='number'?'number':'text'}" inputmode="${h.type==='number'?'numeric':'text'}" placeholder="" onclick="event.stopPropagation()" onchange="completeHabitInputThenTime('${h.id}',this)">`;
    } else if(h.trackTime){
      // trackTime on (checkbox): entire row is tap-to-open-tracker
      row.innerHTML=`<span class="habit-name">${h.name}</span>`;
    } else if(h.type==='number'||h.type==='text'){
      row.innerHTML=`<span class="habit-name" style="flex:1">${h.name}</span><input class="habit-value-input" type="${h.type==='number'?'number':'text'}" inputmode="${h.type==='number'?'numeric':'text'}" placeholder="" onclick="event.stopPropagation()" onchange="completeHabitInput('${h.id}',this)">`;
    } else {
      row.innerHTML=`<span class="habit-name">${h.name}</span>`;
    }
    return row;
  });
}

/* ── THINGS TAP ── */
const timers={};
function thingsTap(key,onConfirm){
  const row=document.getElementById(`row-${key}`);
  if(!row) return;
  if(timers[key]){ clearTimeout(timers[key]); delete timers[key]; return; }
  const name=row.querySelector('.habit-name')?.textContent||'';
  const rect=row.getBoundingClientRect();
  const isLast=!row.nextElementSibling;
  spawnConfetti(rect.right-18, rect.top+10);
  row.classList.add('done-glow');
  // Freeze exact height so siblings don't shift during animation
  const h=row.getBoundingClientRect().height;
  row.style.setProperty('--row-h', h+'px');
  row.style.height=h+'px';
  row.style.minHeight='0';
  row.style.overflow='hidden';
  row.style.flexShrink='0';
  // If last habit, animate progress bar to 100% first, then collapse
  const pb_fill=document.getElementById('pbFill');
  const pb_el=document.getElementById('progressBar');
  if(isLast && pb_el && pb_fill){
    pb_fill.style.width='100%';
    onConfirm();
    setTimeout(()=>{
      pb_el.classList.remove('visible');
      row.offsetHeight;
      row.classList.add('vanishing');
      row.style.opacity='0'; row.style.height='0'; row.style.marginBottom='0';
      const done=()=>{ row.remove(); renderHome(); showUndoToast(name,key,onConfirm); };
      row.addEventListener('transitionend',done,{once:true,passive:true});
      setTimeout(done,700);
    },500);
  } else {
    row.offsetHeight;
    row.classList.add('vanishing');
    row.style.opacity='0'; row.style.height='0'; row.style.marginBottom='0';
    onConfirm();
    const done=()=>{ row.remove(); renderHome(); showUndoToast(name,key,onConfirm); };
    row.addEventListener('transitionend',done,{once:true,passive:true});
    setTimeout(done,650);
  }
}
let _undoTimer=null,_undoKey=null,_undoConfirm=null;
function showUndoToast(name,key,onConfirm){
  const ex=document.getElementById('undoToast'); if(ex) ex.remove();
  if(_undoTimer){ clearTimeout(_undoTimer); _undoTimer=null; }
  _undoKey=key; _undoConfirm=onConfirm;
  const t=document.createElement('div');
  t.id='undoToast';
  t.style.cssText='position:fixed;bottom:calc(var(--safe-bottom)+110px);left:50%;transform:translateX(-50%);z-index:300;background:rgba(28,28,30,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:22px;padding:11px 20px 11px 16px;display:flex;align-items:center;gap:14px;font-size:14px;color:rgba(255,255,255,0.75);white-space:nowrap;animation:toastIn .25s cubic-bezier(.34,1.56,.64,1) forwards;box-shadow:0 4px 24px rgba(0,0,0,0.4);';
  t.innerHTML=`<span style="opacity:.55;max-width:170px;overflow:hidden;text-overflow:ellipsis">${name||'Gotowe'}</span><button onclick="undoLastComplete()" style="background:none;border:none;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;padding:0;touch-action:manipulation">Cofnij</button>`;
  document.body.appendChild(t);
  _undoTimer=setTimeout(dismissUndoToast,3200);
}
function dismissUndoToast(){
  if(_undoTimer){ clearTimeout(_undoTimer); _undoTimer=null; }
  const t=document.getElementById('undoToast'); if(!t) return;
  t.style.animation='toastOut .2s ease forwards';
  setTimeout(()=>t.remove(),220);
  _undoKey=null; _undoConfirm=null;
}
function undoLastComplete(){
  dismissUndoToast();
  if(!_undoKey) return;
  const hId=_undoKey;
  const dd=getDayData(); delete dd.habits[hId]; updateStreak(hId,false); save(); renderHome();
}
function handleHabitTap(hId){
  const h=state.habits.find(x=>x.id===hId); if(!h) return;
  if(h.trackTime){
    if(h.type==='number'||h.type==='text'){
      openInputSheetThenTime(h);
      return;
    }
    openTimeTracker(hId); return;
  }
  if(h.type==='number'||h.type==='text') return;
  if(h.url){ thingsTap(hId,()=>{ completeHabit(hId,true); try{ window.open(h.url,'_blank'); }catch(e){} }); return; }
  thingsTap(hId,()=>completeHabit(hId,true));
}

function openInputSheetThenTime(h){
  curHabit=h;
  document.getElementById('inputSheetLabel').textContent=h.name;
  const f=document.getElementById('inputSheetField');
  f.value=''; f.type=h.type==='number'?'number':'text';
  f.inputMode=h.type==='number'?'numeric':'text';
  f.placeholder=h.type==='number'?'0':'';
  // Replace confirm button behavior
  const confirmBtn=document.querySelector('#inputSheet .is-confirm');
  if(confirmBtn){
    confirmBtn._origOnclick=confirmBtn.onclick;
    confirmBtn.onclick=()=>{
      const v=f.value.trim();
      if(v){ completeHabit(h.id,v); }
      closeInputSheet();
      confirmBtn.onclick=confirmBtn._origOnclick;
      openTimeTracker(h.id);
    };
  }
  showSheet('inputSheet');
  setTimeout(()=>f.focus(),340);
}
function handleTempTap(tId){
  const key=`t${tId}`;
  const row=document.getElementById(`row-${key}`);
  if(!row) return;
  const onConfirm=()=>{ save(); };
  const name=row.querySelector('.habit-name')?.textContent||'';
  row.style.maxHeight=row.offsetHeight+'px';
  onConfirm();
  requestAnimationFrame(()=>row.classList.add('vanishing'));
  row.addEventListener('transitionend',()=>{ row.remove(); renderHome(); showUndoToast(name,key,onConfirm); },{once:true,passive:true});
}
function completeHabit(hId,val){ const dd=getDayData(); dd.habits[hId]=val; updateStreak(hId,true); save(); }
function completeHabitInput(hId,input){
  const val=input.value.trim(); if(!val) return;
  input.blur();
  const row=document.getElementById('row-'+hId); if(!row) return;
  completeHabit(hId,val);
  row.style.maxHeight=row.offsetHeight+'px';
  requestAnimationFrame(()=>row.classList.add('vanishing'));
  row.addEventListener('transitionend',()=>renderHome(),{once:true});
}
function completeHabitInputThenTime(hId,input){
  const val=input.value.trim(); if(!val) return;
  input.blur();
  if(val) completeHabit(hId,val);
  openTimeTracker(hId);
}

/* ── EXTRAS SHEET ── */
function openSheet(){
  const dd=getDayData(); const body=document.getElementById('sheetBody');
  const extras=(state.extraStats||[]).slice().sort((a,b)=>(a.order||0)-(b.order||0));
  const pending=extras.filter(e=>!isDone(dd.extras?.[e.id]));
  if(!pending.length){
    body.innerHTML=`<div class="extras-done"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>`;
    showSheet('mainSheet'); return;
  }
  let html='<div style="display:flex;flex-direction:column;gap:10px;padding:8px 0">';
  for(const e of pending){
    if(e.trackTime){
      // trackTime extras — tap opens time screen, no input field
      html+=`<div class="habit-row row-visible" id="xrow-${e.id}" style="animation:none" onclick="openExtraTimeScreen('${e.id}')">
        <span class="habit-name">${e.name}</span>
      </div>`;
    } else if(e.type==='checkbox'){
      html+=`<div class="habit-row row-visible" id="xrow-${e.id}" style="animation:none" data-eid="${e.id}" onclick="completeExtraCheck('${e.id}')">
        <span class="habit-name">${e.name}</span>
      </div>`;
    } else {
      html+=`<div class="habit-row row-visible" id="xrow-${e.id}" style="animation:none">
        <span class="habit-name" style="flex:1">${e.name}</span>
        <input class="habit-value-input" type="${e.type==='number'?'number':'text'}" inputmode="${e.type==='number'?'numeric':'text'}" placeholder="" onclick="event.stopPropagation()" onchange="completeExtraInput('${e.id}',this)">
      </div>`;
    }
  }
  html+='</div>';
  body.innerHTML=html; showSheet('mainSheet');
}
function completeExtraCheck(eId){
  const dd=getDayData(); if(!dd.extras) dd.extras={};
  dd.extras[eId]=true; save();
  const row=document.getElementById('xrow-'+eId);
  if(row){ row.style.maxHeight=row.offsetHeight+'px'; row.classList.add('vanishing'); row.addEventListener('transitionend',()=>openSheet(),{once:true}); }
}
function completeExtraInput(eId,input){
  const val=input.value.trim(); if(!val) return;
  input.blur();
  const dd=getDayData(); if(!dd.extras) dd.extras={};
  dd.extras[eId]=val; save();
  const row=document.getElementById('xrow-'+eId);
  if(row){ row.style.maxHeight=row.offsetHeight+'px'; row.classList.add('vanishing'); row.addEventListener('transitionend',()=>openSheet(),{once:true}); }
}

let _extraTimeId=null;
let etSelBlocks=new Set();
function openExtraTimeScreen(eId){
  _extraTimeId=eId;
  etSelBlocks.clear();
  const e=state.extraStats.find(x=>x.id===eId); if(!e) return;
  document.getElementById('etHabitName').textContent=e.name;
  renderExtraTimeGrid();
  document.getElementById('extraTimeScreen').style.transform='translateY(0)';
}
function closeExtraTimeScreen(){
  document.getElementById('extraTimeScreen').style.transform='translateY(100%)';
  _extraTimeId=null; etSelBlocks.clear();
  updateEtDuration();
}
function saveExtraTime(){
  if(!_extraTimeId){ closeExtraTimeScreen(); return; }
  const e=state.extraStats.find(x=>x.id===_extraTimeId); if(!e) return;
  const dd=getDayData(); if(!dd.extras) dd.extras={};
  dd.extras[_extraTimeId]=true;
  if(etSelBlocks.size>0){
    const blocks=Array.from(etSelBlocks).map(k=>{const[hh,q]=k.split(':');return{h:+hh,q:+q};});
    const k=today();
    if(!state.timeEntries) state.timeEntries={};
    if(!state.timeEntries[k]) state.timeEntries[k]=[];
    state.timeEntries[k].push({id:'tt'+Date.now(),label:e.name,blocks});
  }
  save(); closeExtraTimeScreen(); openSheet();
}
function renderExtraTimeGrid(){
  const inner=document.getElementById('etGridInner'); if(!inner) return;
  const filled=getFilledBlocks();
  const now=new Date(); const curH=now.getHours();
  const startH=Math.max(0,curH-4);
  let html='';
  for(let h=startH;h<24;h++){
    const allFull=[0,1,2,3].every(q=>filled.has(`${h}:${q}`)); if(allFull) continue;
    html+=`<div class="tt-hour-row" style="gap:0"><div class="tt-hour-label">${h}</div><div class="tt-blocks" style="position:relative">`;
    for(let q=0;q<4;q++){
      const key=`${h}:${q}`;
      const isSel=etSelBlocks.has(key);
      const isFilled=filled.has(key);
      html+=`<div class="tt-block${isFilled?' filled':''}${isSel?' selecting':''}" data-h="${h}" data-q="${q}"
        style="${isFilled?'background:var(--bg);':''}${isSel&&!isFilled?'background:rgba(61,221,101,0.45);':''}"
        ontouchstart="etBlockTouch(event,${h},${q})"
        ontouchmove="etBlockMove(event)"
        ontouchend="etBlockEnd()"
        onclick="etBlockClick(${h},${q})"></div>`;
    }
    html+=`</div></div>`;
  }
  inner.innerHTML=html;
  updateEtDuration();
  requestAnimationFrame(()=>{
    const grid=document.getElementById('etGrid');
    const first=inner.firstElementChild;
    if(first&&grid) grid.scrollTop=Math.max(0,first.offsetTop-100);
  });
}
let etTouchStartH=-1,etTouchStartQ=-1,etTouchEndH=-1,etTouchEndQ=-1,etTouchActive=false;
function etBlockClick(h,q){
  const key=`${h}:${q}`;
  if(etSelBlocks.has(key)) etSelBlocks.delete(key); else etSelBlocks.add(key);
  renderExtraTimeGrid();
}
function etBlockTouch(e,h,q){
  e.preventDefault(); etTouchActive=true;
  etTouchStartH=h; etTouchStartQ=q; etTouchEndH=h; etTouchEndQ=q;
  etSelBlocks.clear(); etUpdateRange(); renderExtraTimeGrid();
}
function etBlockMove(e){
  if(!etTouchActive) return; e.preventDefault();
  const t=e.touches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const dh=parseInt(el?.dataset?.h),dq=parseInt(el?.dataset?.q);
  if(isNaN(dh)||isNaN(dq)||(dh===etTouchEndH&&dq===etTouchEndQ)) return;
  etTouchEndH=dh; etTouchEndQ=dq; etUpdateRange(); renderExtraTimeGrid();
}
function etBlockEnd(){ etTouchActive=false; }
function etUpdateRange(){
  const s=blockIndex(etTouchStartH,etTouchStartQ), e2=blockIndex(etTouchEndH,etTouchEndQ);
  const lo=Math.min(s,e2),hi=Math.max(s,e2);
  etSelBlocks.clear();
  for(let i=lo;i<=hi;i++){const{h,q}=indexToHQ(i);etSelBlocks.add(`${h}:${q}`);}
}
function updateEtDuration(){
  const el=document.getElementById('etDuration'); if(!el) return;
  if(!etSelBlocks.size){el.innerHTML='';return;}
  const sorted=[...etSelBlocks].map(k=>{const[h,q]=k.split(':');return{h:+h,q:+q};}).sort((a,b)=>blockIndex(a.h,a.q)-blockIndex(b.h,b.q));
  const f=sorted[0],l=sorted[sorted.length-1];
  const fmt=(h,q)=>`${h}:${String(q*15).padStart(2,'0')}`;
  const eq=(l.q+1)%4,eh=l.h+(l.q===3?1:0);
  const mins=etSelBlocks.size*15,hh=Math.floor(mins/60),m=mins%60;
  el.innerHTML=`<span style="font-size:22px;font-weight:300">${fmt(f.h,f.q)}–${fmt(eh,eq)}</span><span style="display:block;font-size:13px;color:rgba(255,255,255,0.5);margin-top:2px">${hh>0?hh+'h':''}${m>0?' '+m+'m':''}</span>`;
}

/* ── STREAKS — last 7 days, day-number only ── */
function updateStreak(hId,done){
  if(!state.streaks[hId]) state.streaks[hId]=[];
  const t=today();
  const i=state.streaks[hId].findIndex(x=>x.date===t);
  if(i>=0) state.streaks[hId][i].done=done;
  else state.streaks[hId].push({date:t,done});
  state.streaks[hId]=state.streaks[hId].slice(-90);
}
function getLast7(hId){
  const out=[]; const d=new Date(); const t=today();
  for(let i=6;i>=0;i--){
    const d2=new Date(d); d2.setDate(d.getDate()-i);
    const k=fmtDate(d2);
    const e=(state.streaks[hId]||[]).find(x=>x.date===k);
    out.push({done:e?.done||false,isToday:k===t,dayNum:d2.getDate()});
  }
  return out;
}
function getStreakCount(hId){
  const arr=(state.streaks[hId]||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  let cnt=0;
  for(const e of arr){ if(!e.done) break; cnt++; }
  return cnt;
}

const _delTimers={};
function askDelete(btn,label,onConfirm){
  if(btn.classList.contains('confirm-pending')){
    clearTimeout(_delTimers[label]);
    delete _delTimers[label];
    btn.classList.remove('confirm-pending');
    btn.innerHTML=btn._origHTML||btn.innerHTML;
    onConfirm();
    return;
  }
  btn._origHTML=btn.innerHTML;
  btn.classList.add('confirm-pending');
  btn.innerHTML=`Usuń „${label}"?`;
  _delTimers[label]=setTimeout(()=>{
    btn.classList.remove('confirm-pending');
    btn.innerHTML=btn._origHTML||btn.innerHTML;
    delete _delTimers[label];
  },3000);
}

let dragId=null,dragOverId=null;
function dragStart(e,hId){ dragId=hId; e.dataTransfer.effectAllowed='move'; }
function dragOver(e,hId){ e.preventDefault(); if(dragOverId!==hId){ dragOverId=hId; highlightH(hId); } }
function dragDrop(e,hId){ e.preventDefault(); doReorderH(dragId,hId); }
function dragEnd(){ dragId=null; dragOverId=null; clearHighH(); }
function highlightH(hId){ clearHighH(); const el=document.getElementById('shr-'+hId); if(el) el.style.borderTop='2px solid var(--accent)'; }
function clearHighH(){ document.querySelectorAll('.sector-habit-row').forEach(r=>r.style.borderTop=''); }
function doReorderH(fromId,toId){
  if(!fromId||!toId||fromId===toId){ clearHighH(); renderSettings(); return; }
  const from=state.habits.find(h=>h.id===fromId),to=state.habits.find(h=>h.id===toId);
  if(!from||!to||from.sectorId!==to.sectorId){ clearHighH(); renderSettings(); return; }
  const fi=state.habits.indexOf(from),ti=state.habits.indexOf(to);
  state.habits.splice(fi,1); state.habits.splice(ti,0,from);
  state.habits.filter(h=>h.sectorId===from.sectorId).forEach((h,i)=>h.order=i);
  save(); renderSettings();
}
let tDragId=null,tDragOverId=null,tDragMoved=false,tDragActive=false,tDragStartX=0,tDragStartY=0,tDragTimer=null;
function hRowTouchStart(e,hId){
  tDragId=hId; tDragMoved=false; tDragActive=false;
  tDragStartX=e.touches[0].clientX; tDragStartY=e.touches[0].clientY;
  tDragTimer=setTimeout(()=>{ tDragActive=true; document.getElementById('shr-'+hId)?.classList.add('drag-lift'); },280);
}
function touchDragMove(e){
  if(!tDragId) return;
  const dx=Math.abs(e.touches[0].clientX-tDragStartX),dy=Math.abs(e.touches[0].clientY-tDragStartY);
  if(dx>8||dy>8){
    if(!tDragActive){ clearTimeout(tDragTimer); tDragTimer=null; tDragId=null; return; }
    tDragMoved=true; e.preventDefault();
    const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY)?.closest('[data-hid]');
    const oid=el?.dataset.hid;
    if(oid&&oid!==tDragId&&oid!==tDragOverId){ tDragOverId=oid; highlightH(oid); }
  }
}
function touchDragEnd(e,sId){
  clearTimeout(tDragTimer); tDragTimer=null;
  document.getElementById('shr-'+tDragId)?.classList.remove('drag-lift');
  if(tDragActive&&tDragMoved&&tDragOverId&&tDragOverId!==tDragId) doReorderH(tDragId,tDragOverId);
  else{ clearHighH(); if(!tDragActive&&!tDragMoved) openHabitDetail(tDragId); else renderSettings(); }
  tDragId=null; tDragOverId=null; tDragMoved=false; tDragActive=false;
}

  const trackCatId=editHabitId!=='new'?(state.habits.find(x=>x.id===editHabitId)?.trackCatId||null):null;
  if(editHabitId==='new'){
    const sectorId=editHabitSectorId||state.sectors[0]?.id;

    state.habits.push({id:'h'+Date.now(),name,sectorId,type,days,url,archived,order,trackTime,trackCatId});
  } else {
    const h=state.habits.find(x=>x.id===editHabitId); if(h) Object.assign(h,{name,type,days,url,archived,trackTime,trackCatId});

}

let htTouchStartH=-1,htTouchStartQ=-1,htTouchEndH=-1,htTouchEndQ=-1,htTouchActive=false;
function htBlockClick(h,q){
  const key=`${h}:${q}`;
  if(htSelBlocks.has(key)) htSelBlocks.delete(key); else htSelBlocks.add(key);

}
function htBlockTouch(e,h,q){
  e.preventDefault(); htTouchActive=true;
  htTouchStartH=h; htTouchStartQ=q; htTouchEndH=h; htTouchEndQ=q;
  htSelBlocks.clear(); htUpdateRange(); renderHabitTimeGrid();
}
function htBlockMove(e){
  if(!htTouchActive) return; e.preventDefault();
  const t=e.touches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const dh=parseInt(el?.dataset?.h),dq=parseInt(el?.dataset?.q);
  if(isNaN(dh)||isNaN(dq)||dh===htTouchEndH&&dq===htTouchEndQ) return;
  htTouchEndH=dh; htTouchEndQ=dq; htUpdateRange(); renderHabitTimeGrid();
}
function htBlockEnd(){ htTouchActive=false; }
function htUpdateRange(){
  const s=blockIndex(htTouchStartH,htTouchStartQ), e=blockIndex(htTouchEndH,htTouchEndQ);
  const lo=Math.min(s,e),hi=Math.max(s,e);
  htSelBlocks.clear();
  for(let i=lo;i<=hi;i++){const{h,q}=indexToHQ(i);htSelBlocks.add(`${h}:${q}`);}
}
function updateHtDuration(){
  const el=document.getElementById('htDuration'); if(!el) return;
  if(!htSelBlocks.size){el.innerHTML='';return;}
  const sorted=[...htSelBlocks].map(k=>{const[h,q]=k.split(':');return{h:+h,q:+q};}).sort((a,b)=>blockIndex(a.h,a.q)-blockIndex(b.h,b.q));
  const f=sorted[0],l=sorted[sorted.length-1];
  const fmt=(h,q)=>`${h}:${String(q*15).padStart(2,'0')}`;
  const eq=(l.q+1)%4,eh=l.h+(l.q===3?1:0);
  const mins=htSelBlocks.size*15,hh=Math.floor(mins/60),m=mins%60;
  el.innerHTML=`<span style="font-size:22px;font-weight:300;letter-spacing:0.02em">${fmt(f.h,f.q)}–${fmt(eh,eq)}</span><span style="display:block;font-size:13px;color:rgba(255,255,255,0.5);margin-top:2px">${hh>0?hh+'h':''}${m>0?' '+m+'m':''}</span>`;
}

/* ── EXPORT CSV ── */
function buildCSVRows(){
  const rows=[];
  // ── NAWYKI ──
  rows.push(['data','sektor','habit','wartosc']);
  for(const[k,data]of Object.entries(state.daily).sort()){
    for(const[hId,val]of Object.entries(data.habits||{})){
      if(!isDone(val)) continue;
      const h=state.habits.find(x=>x.id===hId);
      const sec=state.sectors.find(s=>s.id===h?.sectorId);
      rows.push([k,sec?.name||'',h?.name||hId,val===true?1:String(val)]);
    }
  }
  rows.push(['']);
  // ── CZAS ──
  rows.push(['data','aktywnosc','minuty']);
  for(const[k,entries]of Object.entries(state.timeEntries||{}).sort()){
    for(const e of entries){
      if(e.empty) continue;
      const mins=(e.blocks?.length||0)*15;
      rows.push([k,e.label||'',mins]);
    }
  }
  return rows;
}

function exportCSV(sep){
  sep=sep||',';
  const rows=buildCSVRows();
  const csv=rows.map(r=>r.map(cell=>`"${String(cell===null||cell===undefined?'':cell).replace(/"/g,'""')}"`).join(sep)).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`dane ${today()}.csv`; a.click(); URL.revokeObjectURL(url);
}

/* Touch drag to select continuous range of blocks — Blockify style */
let ttTouchStartH=-1, ttTouchStartQ=-1, ttTouchEndH=-1, ttTouchEndQ=-1;

function blockIndex(h,q){ return h*4+q; }
function indexToHQ(i){ return {h:Math.floor(i/4),q:i%4}; }

function updateSelectionFromRange(){
  const startIdx=blockIndex(ttTouchStartH,ttTouchStartQ);
  const endIdx=blockIndex(ttTouchEndH,ttTouchEndQ);
  const lo=Math.min(startIdx,endIdx), hi=Math.max(startIdx,endIdx);
  ttSelBlocks.clear();
  for(let i=lo;i<=hi;i++){
    const {h,q}=indexToHQ(i);
    ttSelBlocks.add(`${h}:${q}`); // include filled blocks too
  }
}

function ttBlockTouchStart(e,h,q){
  e.preventDefault();
  ttTouchActive=true;
  ttTouchStartH=h; ttTouchStartQ=q;
  ttTouchEndH=h; ttTouchEndQ=q;
  ttSelecting=true;
  ttSelBlocks.clear();
  updateSelectionFromRange();
  renderTTGrid();
  updateTTSelectionBar();
}
function ttBlockTouchMove(e){
  if(!ttTouchActive||!ttSelecting) return;
  e.preventDefault();
  const touch=e.touches[0];
  // Walk up from elementFromPoint, skipping overlays
  let dh, dq;
  const els=document.elementsFromPoint?document.elementsFromPoint(touch.clientX,touch.clientY):[document.elementFromPoint(touch.clientX,touch.clientY)];
  for(const el of els){
    if(el?.dataset?.h!==undefined&&!isNaN(+el.dataset.h)){
      dh=+el.dataset.h; dq=+el.dataset.q; break;
    }
  }
  if(dh===undefined||isNaN(dh)) return;
  if(dh===ttTouchEndH&&dq===ttTouchEndQ) return;
  ttTouchEndH=dh; ttTouchEndQ=dq;
  updateSelectionFromRange();
  renderTTGrid();
  updateTTSelectionBar();
}
function ttBlockTouchEnd(e){
  ttTouchActive=false;
  if(ttSelBlocks.size>0){
    if(_ttHabitId){
      // Habit mode: show entry panel WITH duration display (same as normal mode)
      updateTTSelectionBar();
      // Show duration in ttEntryDuration without showing the full panel
      document.getElementById('ttHabitSaveBar').style.display='block';
    } else {
      showTTEntryPanel();
    }
  } else ttSelecting=false;
}
function ttBlockClick(h,q){
  const key=`${h}:${q}`;
  const filled=getFilledBlocks();
  const entry=filled.get(key);
  // If it's a filled block and nothing is being selected, open edit
  if(entry&&ttSelBlocks.size===0){
    editTTEntry(entry.id);
    return;
  }
  // Otherwise treat as regular block toggle
  if(ttSelBlocks.size===1&&ttSelBlocks.has(key)){
    ttSelBlocks.clear(); ttSelecting=false;
    renderTTGrid(); updateTTSelectionBar(); closeTTEntry(); return;
  }
  ttSelBlocks.clear();
  ttSelBlocks.add(key);
  ttTouchStartH=h; ttTouchStartQ=q; ttTouchEndH=h; ttTouchEndQ=q;
  ttSelecting=true;
  renderTTGrid(); updateTTSelectionBar(); showTTEntryPanel();
}

function drawSelectionOutline(){
  // Remove old outline
  document.getElementById('ttSelOutline')?.remove();
  if(!ttSelBlocks.size) return;
  // Find bounding box of selection in DOM coordinates
  const blocks=[];
  for(const key of ttSelBlocks){
    const [h,q]=key.split(':');
    const el=document.querySelector(`[data-h="${h}"][data-q="${q}"]`);
    if(el) blocks.push(el.getBoundingClientRect());
  }
  if(!blocks.length) return;
  const scroll=document.getElementById('ttScroll');
  const scrollRect=scroll.getBoundingClientRect();
  const scrollTop=scroll.scrollTop;
  const top=Math.min(...blocks.map(r=>r.top))-scrollRect.top+scrollTop;
  const bot=Math.max(...blocks.map(r=>r.bottom))-scrollRect.top+scrollTop;
  const lft=Math.min(...blocks.map(r=>r.left))-scrollRect.left;
  const rgt=Math.max(...blocks.map(r=>r.right))-scrollRect.left;
  const div=document.createElement('div');
  div.id='ttSelOutline';
  div.style.cssText=`position:absolute;top:${top}px;left:${lft}px;width:${rgt-lft}px;height:${bot-top}px;border:2.5px solid rgba(90,250,126,0.85);border-radius:6px;pointer-events:none;z-index:30;touch-action:none;`;
  scroll.appendChild(div);
}

function updateTTSelectionBar(){
  if(!ttSelBlocks.size){
    document.getElementById('ttEntryDuration').textContent='';
    const hd=document.getElementById('ttHabitDuration');
    if(hd) hd.innerHTML='';
    return;
  }
  const mins=ttSelBlocks.size*15;
  const hh=Math.floor(mins/60),m=mins%60;
  const dur=hh>0?`${hh}h${m>0?' '+m+'m':''}`:mins+'m';
  const bigHTML=`<span style="display:block;font-size:30px;font-weight:200;letter-spacing:-.02em;color:#fff">${dur}</span>`;
  document.getElementById('ttEntryDuration').innerHTML=bigHTML;
  const hd=document.getElementById('ttHabitDuration');
  if(hd) hd.innerHTML=bigHTML;
}

function getTTSuggestions(query){
  const now=new Date();
  const freq={};
  for(const[dk,entries] of Object.entries(state.timeEntries||{})){
    const d=new Date(dk+'T00:00:00');
    if((now-d)/(864e5)>90) continue;
    for(const e of entries){
      if(!e.label||e.empty) continue;

      const key=e.label.trim();
      if(!freq[key]) freq[key]={label:key,count:0};
      freq[key].count++;
    }
  }
  let items=Object.values(freq).sort((a,b)=>b.count-a.count);
  if(query){
    const q=query.toLowerCase();
    items=items.filter(x=>x.label.toLowerCase().startsWith(q));
    if(!items.length) items=Object.values(freq).sort((a,b)=>b.count-a.count).filter(x=>x.label.toLowerCase().includes(q));
    return items.slice(0,5);
  }
  return items.slice(0,3);
}

function renderTTSuggestions(query){
  const box=document.getElementById('ttSuggestions');
  if(!box) return;
  const items=getTTSuggestions(query);
  box.style.cssText='margin:12px 0 0;display:block';
  box.innerHTML='';
  if(!items.length && !query) return;

    div.textContent=item.label;

  });
}

function fillAndSaveTTSuggestion(label){
  const blocks=Array.from(ttSelBlocks).map(k=>{const[h,q]=k.split(':');return{h:+h,q:+q};});
  if(!blocks.length) return;
  const k=today();
  if(!state.timeEntries) state.timeEntries={};
  if(!state.timeEntries[k]) state.timeEntries[k]=[];
  state.timeEntries[k].push({id:'tt'+Date.now(),label,blocks});
  save(); renderTTGrid(); ttSelBlocks.clear(); ttSelecting=false;
  closeTTEntry();
  if(_ttHabitId) completeHabit(_ttHabitId,true);
  // Close time tracker and return to home
  closeTimeTracker();
  renderHome();
}
function applyTTSuggestion(label){
  ttEntryLabel=label;
  // save immediately
  const blocks=Array.from(ttSelBlocks).map(k=>{const[h,q]=k.split(':');return{h:+h,q:+q};});

  if(!state.timeEntries) state.timeEntries={};

}

function cancelTTSelection(){
  // × = mark selected blocks as "empty time" — fill them so they appear as used but with no label
  if(ttSelBlocks.size>0){
    const blocks=Array.from(ttSelBlocks).map(k=>{const[h,q]=k.split(':');return{h:parseInt(h),q:parseInt(q)};});
    const k=today();
    const entries=getTodayEntries();
    // Remove selected blocks from existing entries first
    for(const e of entries){
      e.blocks=(e.blocks||[]).filter(b=>!ttSelBlocks.has(`${b.h}:${b.q}`));
    }
    if(state.timeEntries?.[k]) state.timeEntries[k]=entries.filter(e=>e.blocks.length>0);
    // Add as empty entry (no label, no category)
    getTodayEntries().push({id:'tt'+Date.now(),label:'',catId:null,blocks,empty:true});
    save();
  }
  ttSelBlocks.clear(); ttSelecting=false; ttEntryLabel='';
  document.getElementById('ttEntryPanel').classList.remove('open');
  document.getElementById('ttEntryBackdrop').style.display='none';
  document.getElementById('ttEntryField').blur();
  document.getElementById('ttDelBtn')?.remove();
  document.getElementById('ttClearBtn')?.remove();
  ttEditingEntryId=null;
  renderTTGrid();
}

function clearSelectedFilledBlocks(){
  const filled=getFilledBlocks();
  const k=today();
  const entries=getTodayEntries();
  // For each filled selected block, remove its entry or trim its blocks
  const toDelete=new Set();
  for(const selKey of ttSelBlocks){
    const entry=filled.get(selKey);
    if(!entry) continue;
    // Remove only the selected blocks from this entry
    entry.blocks=entry.blocks.filter(b=>!ttSelBlocks.has(`${b.h}:${b.q}`));
    if(entry.blocks.length===0) toDelete.add(entry.id);
  }
  if(state.timeEntries?.[k]) state.timeEntries[k]=state.timeEntries[k].filter(e=>!toDelete.has(e.id));
  save(); closeTTEntry();
}
let ttEntryLabel='';
let ttLabelPhase=false;

function closeTTEntry(){
  document.getElementById('ttEntryPanel').classList.remove('open');
  document.getElementById('ttEntryBackdrop').style.display='none';
  document.getElementById('ttEntryField').blur();
  document.getElementById('ttDelBtn')?.remove();
  document.getElementById('ttClearBtn')?.remove();
  ttSelBlocks.clear(); ttSelecting=false; ttEntryLabel='';
  ttEditingEntryId=null;
  renderTTGrid();
}

let ttEditingEntryId=null;
function editTTEntry(entryId){
  const entries=getTodayEntries();
  const entry=entries.find(e=>e.id===entryId);
  if(!entry) return;
  ttEditingEntryId=entryId;
  ttSelBlocks.clear();
  for(const b of (entry.blocks||[])) ttSelBlocks.add(`${b.h}:${b.q}`);
  ttSelecting=true;
  ttEntryLabel=entry.label||'';
  updateTTSelectionBar();
  const row=document.getElementById('ttCatRow');
  row.style.display='';
  row.innerHTML=`<div style="flex:1"></div><button onclick="cancelTTSelection()" style="width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.06);border:none;color:rgba(255,255,255,0.5);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;font-weight:300">×</button>`;
  const field=document.getElementById('ttEntryField');
  field.style.display='';
  field.value=ttEntryLabel;
  // suggestions
  const box=document.getElementById('ttSuggestions');
  if(box){ box.style.display=''; renderTTSuggestions(''); }
  if(field._sugHandler) field.removeEventListener('input', field._sugHandler);
  field._sugHandler=()=>{ ttEntryLabel=field.value; renderTTSuggestions(field.value); };
  field.addEventListener('input', field._sugHandler);
  // Delete button
  document.getElementById('ttDelBtn')?.remove();
  const del=document.createElement('button');
  del.id='ttDelBtn';
  del.style.cssText='width:100%;background:none;border:none;border-radius:12px;padding:12px;color:rgba(224,85,85,0.55);font-size:14px;font-family:inherit;cursor:pointer;margin-top:6px';
  del.textContent='Usuń';
  del.onclick=()=>deleteTTEntry(ttEditingEntryId);
  document.getElementById('ttEntryPanel').appendChild(del);
  document.getElementById('ttEntryPanel').classList.add('open');
  renderTTGrid();
}
function deleteTTEntry(entryId){
  const k=today();
  if(state.timeEntries?.[k]) state.timeEntries[k]=state.timeEntries[k].filter(e=>e.id!==entryId);
  save(); closeTTEntry();
}

function saveTTEntry(){
  if(ttSelBlocks.size===0) return;
  const label=document.getElementById('ttEntryField').value.trim();
  const blocks=Array.from(ttSelBlocks).map(k=>{ const[h,q]=k.split(':'); return{h:parseInt(h),q:parseInt(q)}; });
  const k=today();
  const entries=getTodayEntries();

  if(ttEditingEntryId){
    // Editing: update existing entry
    const idx=entries.findIndex(e=>e.id===ttEditingEntryId);
    if(idx>=0) entries[idx]={...entries[idx],label,blocks};
  } else {
    // New entry: remove selected blocks from any existing entries first
    for(const e of entries){
      e.blocks=(e.blocks||[]).filter(b=>!ttSelBlocks.has(`${b.h}:${b.q}`));
    }
    // Remove entries with no blocks left
    if(state.timeEntries?.[k]) state.timeEntries[k]=entries.filter(e=>e.blocks.length>0);
    getTodayEntries().push({id:'tt'+Date.now(),label,blocks});
  }
  save(); closeTTEntry(); closeTimeTracker();
}

// Swipe back from settings
(()=>{
  let sx=0, dragging=false;
  const settings=document.getElementById('settings');
  const home=document.getElementById('home');
  settings.addEventListener('touchstart',e=>{
    sx=e.touches[0].clientX; dragging=false;
  },{passive:true});
  settings.addEventListener('touchmove',e=>{
    if(sx>32) return;
    const dx=e.touches[0].clientX-sx;
    if(dx<0) return;
    dragging=true;
    const pct=Math.min(dx/window.innerWidth*100,100);
    settings.style.transition='none';
    home.style.transition='none';
    settings.style.transform=`translateX(${pct}%)`;
    home.style.transform=`translateX(${-28+pct*0.28}%)`;
  },{passive:true});
  settings.addEventListener('touchend',e=>{
    if(!dragging) return;
    const dx=e.changedTouches[0].clientX-sx;
    settings.style.transition=''; home.style.transition='';
    if(dx>80) closeSettings();
    else{ settings.style.transform='translateX(0)'; home.style.transform='translateX(-28%)'; }
    dragging=false;
  },{passive:true});
})();

// Swipe back from Time Tracker — smooth snap
(()=>{
  let sx=0, moved=false;
  const tt=document.getElementById('timeTracker');
  const home=document.getElementById('home');
  tt.addEventListener('touchstart',e=>{
    sx=e.touches[0].clientX; moved=false;
  },{passive:true});
  tt.addEventListener('touchmove',e=>{
    if(sx>44) return;
    const dx=e.touches[0].clientX-sx;
    if(dx<4) return;
    moved=true;
    const pct=Math.min(dx/window.innerWidth*100,100);
    tt.style.transition='none';
    home.style.transition='none';
    tt.style.transform=`translateX(${pct}%)`;
    home.style.transform=`translateX(${-28+pct*0.28}%)`;
  },{passive:true});
  tt.addEventListener('touchend',e=>{
    if(!moved) return;
    const dx=e.changedTouches[0].clientX-sx;
    moved=false;
    // Double rAF: first frame clears transition:none, second frame triggers the snap animation
    requestAnimationFrame(()=>{
      tt.style.transition='';
      home.style.transition='';
      requestAnimationFrame(()=>{
        if(dx>70) closeTimeTracker();
        else{
          tt.style.transform='translateX(0)';
          home.style.transform='translateX(-28%)';
        }
      });
    });
  },{passive:true});
})();

function mcDragDrop(e,id){ e.preventDefault(); mcReorder(mcDragId,id); }
function mcDragEnd(){ mcDragId=null; }
let mcTDragId=null,mcTDragOver=null,mcTMoved=false,mcTActive=false,mcTStartX=0,mcTStartY=0,mcTTimer=null;
function mcTouchStart(e,id){ mcTDragId=id; mcTMoved=false; mcTActive=false; mcTStartX=e.touches[0].clientX; mcTStartY=e.touches[0].clientY; mcTTimer=setTimeout(()=>{ mcTActive=true; },280); }
function mcTouchMove(e){
  if(!mcTDragId) return;
  const dx=Math.abs(e.touches[0].clientX-mcTStartX),dy=Math.abs(e.touches[0].clientY-mcTStartY);
  if(dx>8||dy>8){
    if(!mcTActive){ clearTimeout(mcTTimer); mcTDragId=null; return; }
    mcTMoved=true; e.preventDefault();
    const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY)?.closest('[data-mcid]');
    if(el) mcTDragOver=el.dataset.mcid;
  }
}
function mcTouchEnd(e,id){ clearTimeout(mcTTimer); if(mcTActive&&mcTMoved&&mcTDragOver&&mcTDragOver!==mcTDragId) mcReorder(mcTDragId,mcTDragOver); else renderSettings(); mcTDragId=null; mcTDragOver=null; mcTMoved=false; mcTActive=false; }
function mcReorder(fromId,toId){
  if(!fromId||!toId||fromId===toId){ renderSettings(); return; }
  const arr=[];// timeCategories removed
  const fi=arr.findIndex(c=>c.id===fromId), ti=arr.findIndex(c=>c.id===toId);
  if(fi<0||ti<0){ renderSettings(); return; }
  const [item]=arr.splice(fi,1); arr.splice(ti,0,item);
  arr.forEach((c,i)=>c.order=i); save(); renderSettings();
}
