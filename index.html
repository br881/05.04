  document.getElementById('ttBackBtn').style.display='block';
  document.getElementById('ttHabitSaveBar').style.display='none';
}
function saveTTHabitMode(){
  if(!_ttHabitId){ closeTimeTracker(); return; }
  const h=state.habits.find(x=>x.id===_ttHabitId);
  if(ttSelBlocks.size>0){
    const blocks=Array.from(ttSelBlocks).map(k=>{const[hh,q]=k.split(':');return{h:+hh,q:+q};});
    const k=today();
    if(!state.timeEntries) state.timeEntries={};
    if(!state.timeEntries[k]) state.timeEntries[k]=[];
    state.timeEntries[k].push({id:'tt'+Date.now(),label:h?.name||ttEntryLabel||'',catId:ttSelectedCat||h?.trackCatId||(state.timeCategories||[])[0]?.id,blocks});
    completeHabit(_ttHabitId,true); save();
  }
  closeTimeTracker(); renderHome();
  // Redirect to URL if set
  if(h?.url){ try{ window.open(h.url,'_blank'); }catch(e){} }
}

function getTodayEntries(){
  const k=today();
  if(!state.timeEntries) state.timeEntries={};
  if(!state.timeEntries[k]) state.timeEntries[k]=[];
  return state.timeEntries[k];
}

// Returns set of "H:Q" for all filled blocks today
function getFilledBlocks(){
  const filled=new Map(); // "H:Q" -> entry
  const entries=getTodayEntries();
  for(const e of entries){
    for(const b of (e.blocks||[])) filled.set(`${b.h}:${b.q}`, e);
  }
  return filled;
}

// Map catId → color for quick lookup
function getCatColor(catId){
  const cat=(state.timeCategories||[]).find(c=>c.id===catId);
  return cat?.color||'rgba(255,255,255,0.15)';
}
function getCatEmoji(catId){
  const cat=(state.timeCategories||[]).find(c=>c.id===catId);
  return cat?.name||'';
}

function renderTTGrid(){
  const filled=getFilledBlocks();
  const grid=document.getElementById('ttGrid');
  let html='';
  let prevH=-1;
  const curH=new Date().getHours();

  for(let h=0;h<24;h++){
    const allFilled=[0,1,2,3].every(q=>filled.has(`${h}:${q}`)&&!ttSelBlocks.has(`${h}:${q}`));
    if(allFilled) continue;

    // Full-width white line to mark a gap (skipped hour)
    if(prevH>=0 && h > prevH+1){
      html+=`<div style="display:flex;align-items:center;height:6px">` +
        `<div style="width:44px;flex-shrink:0"></div>` +
        `<div style="flex:1;height:3px;background:rgba(255,255,255,0.7)"></div>` +
      `</div>`;
    }
    prevH=h;

    html+=`<div class="tt-hour-row" id="tt-row-${h}" style="gap:0">`;
    html+=`<div class="tt-hour-label">${h}</div>`;
    html+=`<div class="tt-blocks" id="tt-blocks-${h}" style="position:relative">`;
    // Ruler tick + current hour line
    if(h===curH){
      html+=`<div style="position:absolute;top:0;left:0;right:0;z-index:3;pointer-events:none">` +
        `<div style="height:3px;background:rgba(239,68,68,1)"></div>` +
      `</div>`;
    } else {
      html+=`<div style="position:absolute;top:0;left:0;width:5%;height:3px;background:rgba(255,255,255,0.45);z-index:2;pointer-events:none"></div>`;
    }

    for(let q=0;q<4;q++){
      const key=`${h}:${q}`;
      const entry=filled.get(key);
      const isSel=ttSelBlocks.has(key);
      if(entry){
        const emptyBg=entry.empty?"background:rgba(255,255,255,0.06)":"background:#000";
        html+=`<div class="tt-block filled${isSel?' selecting':''}" data-h="${h}" data-q="${q}" data-entry="${entry.id}" style="${emptyBg}" ontouchstart="ttBlockTouchStart(event,${h},${q})" ontouchmove="ttBlockTouchMove(event)" ontouchend="ttBlockTouchEnd(event)" onclick="ttBlockClick(${h},${q})"></div>`;
      } else {
        html+=`<div class="tt-block${isSel?' selecting':''}" data-h="${h}" data-q="${q}" id="ttb-${h}-${q}" ontouchstart="ttBlockTouchStart(event,${h},${q})" ontouchmove="ttBlockTouchMove(event)" ontouchend="ttBlockTouchEnd(event)" onclick="ttBlockClick(${h},${q})"></div>`;
      }
    }
    html+=`</div></div>`;
  }
  grid.innerHTML=html;
}

/* Touch drag to select continuous range of blocks — Blockify style */
let ttTouchStartH=-1, ttTouchStartQ=-1, ttTouchEndH=-1, ttTouchEndQ=-1;

function blockIndex(h,q){ return h*4+q; }
function indexToHQ(i){ return {h:Math.floor(i/4),q:i%4}; }

function updateSelectionFromRange(){
  const startIdx=blockIndex(ttTouchStartH,ttTouchStartQ);
  const endIdx=blockIndex(ttTouchEndH,ttTouchEndQ);
  const lo=Math.min(startIdx,endIdx), hi=Math.max(startIdx,endIdx);
  ttSelBlocks.clear();
  for(let i=lo;i<=hi;i++){
    const {h,q}=indexToHQ(i);
    ttSelBlocks.add(`${h}:${q}`); // include filled blocks too
  }
}

function ttBlockTouchStart(e,h,q){
  e.preventDefault();
  ttTouchActive=true;
  ttTouchStartH=h; ttTouchStartQ=q;
  ttTouchEndH=h; ttTouchEndQ=q;
  ttSelecting=true;
  ttSelBlocks.clear();
  updateSelectionFromRange();
  renderTTGrid();
  updateTTSelectionBar();
}
function ttBlockTouchMove(e){
  if(!ttTouchActive||!ttSelecting) return;
  e.preventDefault();
  const touch=e.touches[0];
  // Walk up from elementFromPoint, skipping overlays
  let dh, dq;
  const els=document.elementsFromPoint?document.elementsFromPoint(touch.clientX,touch.clientY):[document.elementFromPoint(touch.clientX,touch.clientY)];
  for(const el of els){
    if(el?.dataset?.h!==undefined&&!isNaN(+el.dataset.h)){
      dh=+el.dataset.h; dq=+el.dataset.q; break;
    }
  }
  if(dh===undefined||isNaN(dh)) return;
  if(dh===ttTouchEndH&&dq===ttTouchEndQ) return;
  ttTouchEndH=dh; ttTouchEndQ=dq;
  updateSelectionFromRange();
  renderTTGrid();
  updateTTSelectionBar();
}
function ttBlockTouchEnd(e){
  ttTouchActive=false;
  if(ttSelBlocks.size>0){
    if(_ttHabitId){
      // Habit mode: show entry panel WITH duration display (same as normal mode)
      updateTTSelectionBar();
      // Show duration in ttEntryDuration without showing the full panel
      document.getElementById('ttHabitSaveBar').style.display='block';
    } else {
      showTTEntryPanel();
    }
  } else ttSelecting=false;
}
function ttBlockClick(h,q){
  const key=`${h}:${q}`;
  const filled=getFilledBlocks();
  const entry=filled.get(key);
  // If it's a filled block and nothing is being selected, open edit
  if(entry&&ttSelBlocks.size===0){
    editTTEntry(entry.id);
    return;
  }
  // Otherwise treat as regular block toggle
  if(ttSelBlocks.size===1&&ttSelBlocks.has(key)){
    ttSelBlocks.clear(); ttSelecting=false;
    renderTTGrid(); updateTTSelectionBar(); closeTTEntry(); return;
  }
  ttSelBlocks.clear();
  ttSelBlocks.add(key);
  ttTouchStartH=h; ttTouchStartQ=q; ttTouchEndH=h; ttTouchEndQ=q;
  ttSelecting=true;
  renderTTGrid(); updateTTSelectionBar(); showTTEntryPanel();
}

function drawSelectionOutline(){
  // Remove old outline
  document.getElementById('ttSelOutline')?.remove();
  if(!ttSelBlocks.size) return;
  // Find bounding box of selection in DOM coordinates
  const blocks=[];
  for(const key of ttSelBlocks){
    const [h,q]=key.split(':');
    const el=document.querySelector(`[data-h="${h}"][data-q="${q}"]`);
    if(el) blocks.push(el.getBoundingClientRect());
  }
  if(!blocks.length) return;
  const scroll=document.getElementById('ttScroll');
  const scrollRect=scroll.getBoundingClientRect();
  const scrollTop=scroll.scrollTop;
  const top=Math.min(...blocks.map(r=>r.top))-scrollRect.top+scrollTop;
  const bot=Math.max(...blocks.map(r=>r.bottom))-scrollRect.top+scrollTop;
  const lft=Math.min(...blocks.map(r=>r.left))-scrollRect.left;
  const rgt=Math.max(...blocks.map(r=>r.right))-scrollRect.left;
  const div=document.createElement('div');
  div.id='ttSelOutline';
  div.style.cssText=`position:absolute;top:${top}px;left:${lft}px;width:${rgt-lft}px;height:${bot-top}px;border:2.5px solid rgba(90,250,126,0.85);border-radius:6px;pointer-events:none;z-index:30;touch-action:none;`;
  scroll.appendChild(div);
}

function updateTTSelectionBar(){
  if(!ttSelBlocks.size){
    document.getElementById('ttEntryDuration').textContent='';
    const hd=document.getElementById('ttHabitDuration');
    const hds=document.getElementById('ttHabitDurationSub');
    if(hd) hd.textContent=''; if(hds) hds.textContent='';
    return;
  }
  const sorted=[...ttSelBlocks].map(k=>{const[h,q]=k.split(':');return{h:+h,q:+q};})
    .sort((a,b)=>blockIndex(a.h,a.q)-blockIndex(b.h,b.q));
  const first=sorted[0], last=sorted[sorted.length-1];
  const fmtT=(h,q)=>`${h}:${String(q*15).padStart(2,'0')}`;
  const endQ=last.q+1;
  const endH=endQ>=4?last.h+1:last.h;
  const endQr=endQ%4;
  const range=`${fmtT(first.h,first.q)}–${fmtT(endH,endQr)}`;
  const mins=ttSelBlocks.size*15;
  const hh=Math.floor(mins/60),m=mins%60;
  const dur=hh>0?`${hh}h${m>0?' '+m+'m':''}`:mins+'m';
  document.getElementById('ttEntryDuration').innerHTML=`<span style="font-size:22px;font-weight:300;letter-spacing:0.02em">${range}</span><span style="display:block;font-size:13px;color:rgba(255,255,255,0.5);margin-top:2px">${dur}</span>`;
  const hd=document.getElementById('ttHabitDuration');
  const hds=document.getElementById('ttHabitDurationSub');
  if(hd) hd.textContent=range; if(hds) hds.textContent=dur;
}

function showTTEntryPanel(){
  updateTTSelectionBar();
  const cats=state.timeCategories||[];
  if(!ttSelectedCat&&cats.length) ttSelectedCat=cats[0].id;
  const row=document.getElementById('ttCatRow');
  // Centered categories + × at right edge (lighter/more visible)
  row.innerHTML=`<div style="flex:1;display:flex;gap:8px;flex-wrap:wrap;justify-content:center">`
    +cats.map(c=>`<div class="tt-cat-pill${ttSelectedCat===c.id?' active':''}" onclick="selectTTCat('${c.id}',this)" style="font-size:20px;padding:8px 16px">${c.name}</div>`).join('')
    +`</div>`
    +`<button onclick="cancelTTSelection()" style="width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.12);border:none;color:rgba(255,255,255,0.6);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;font-weight:300">×</button>`;
  document.getElementById('ttEntryField').value=ttEntryLabel;

  // Check if any selected blocks are filled — show clear button
  const filled=getFilledBlocks();
  const hasFilledSelected=Array.from(ttSelBlocks).some(k=>filled.has(k));
  let clearBtn=document.getElementById('ttClearBtn');
  if(hasFilledSelected){
    if(!clearBtn){
      clearBtn=document.createElement('button');
      clearBtn.id='ttClearBtn';
      clearBtn.style.cssText='width:100%;background:rgba(224,85,85,0.07);border:none;border-radius:12px;padding:12px;color:rgba(224,85,85,0.55);font-size:14px;font-family:inherit;cursor:pointer;margin-top:6px';
      clearBtn.innerHTML=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>`;
      clearBtn.onclick=clearSelectedFilledBlocks;
      document.getElementById('ttEntryPanel').appendChild(clearBtn);
    }
  } else {
    clearBtn?.remove();
  }

  document.getElementById('ttEntryPanel').classList.add('open');
  document.getElementById('ttEntryBackdrop').style.display='block';
  // Focus after panel animation completes — iOS ignores focus during transform
  setTimeout(()=>{
    const f=document.getElementById('ttEntryField');
    f.focus();
  },400);
}

function cancelTTSelection(){
  // × = mark selected blocks as "empty time" — fill them so they appear as used but with no label
  if(ttSelBlocks.size>0){
    const blocks=Array.from(ttSelBlocks).map(k=>{const[h,q]=k.split(':');return{h:parseInt(h),q:parseInt(q)};});
    const k=today();
    const entries=getTodayEntries();
    // Remove selected blocks from existing entries first
    for(const e of entries){
      e.blocks=(e.blocks||[]).filter(b=>!ttSelBlocks.has(`${b.h}:${b.q}`));
    }
    if(state.timeEntries?.[k]) state.timeEntries[k]=entries.filter(e=>e.blocks.length>0);
    // Add as empty entry (no label, no category)
    getTodayEntries().push({id:'tt'+Date.now(),label:'',catId:null,blocks,empty:true});
    save();
  }
  ttSelBlocks.clear(); ttSelecting=false; ttSelectedCat=null; ttEntryLabel='';
  document.getElementById('ttEntryPanel').classList.remove('open');
  document.getElementById('ttEntryBackdrop').style.display='none';
  document.getElementById('ttEntryField').blur();
  document.getElementById('ttDelBtn')?.remove();
  document.getElementById('ttClearBtn')?.remove();
  ttEditingEntryId=null;
  renderTTGrid();
}

function clearSelectedFilledBlocks(){
  const filled=getFilledBlocks();
  const k=today();
  const entries=getTodayEntries();
  // For each filled selected block, remove its entry or trim its blocks
  const toDelete=new Set();
  for(const selKey of ttSelBlocks){
    const entry=filled.get(selKey);
    if(!entry) continue;
    // Remove only the selected blocks from this entry
    entry.blocks=entry.blocks.filter(b=>!ttSelBlocks.has(`${b.h}:${b.q}`));
    if(entry.blocks.length===0) toDelete.add(entry.id);
  }
  if(state.timeEntries?.[k]) state.timeEntries[k]=state.timeEntries[k].filter(e=>!toDelete.has(e.id));
  save(); closeTTEntry();
}
let ttSelectedCat=null;
let ttEntryLabel='';

function closeTTEntry(){
  document.getElementById('ttEntryPanel').classList.remove('open');
  document.getElementById('ttEntryBackdrop').style.display='none';
  document.getElementById('ttEntryField').blur();
  document.getElementById('ttDelBtn')?.remove();
  document.getElementById('ttClearBtn')?.remove();
  ttSelBlocks.clear(); ttSelecting=false; ttSelectedCat=null; ttEntryLabel='';
  ttEditingEntryId=null;
  renderTTGrid();
}

let ttEditingEntryId=null;
function editTTEntry(entryId){
  const entries=getTodayEntries();
  const entry=entries.find(e=>e.id===entryId);
  if(!entry) return;
  ttEditingEntryId=entryId;
  ttSelBlocks.clear();
  for(const b of (entry.blocks||[])) ttSelBlocks.add(`${b.h}:${b.q}`);
  ttSelecting=true;
  ttSelectedCat=entry.catId||null;
  ttEntryLabel=entry.label||'';
  updateTTSelectionBar();
  const cats=state.timeCategories||[];
  const row=document.getElementById('ttCatRow');
  row.innerHTML=cats.map(c=>`<div class="tt-cat-pill${ttSelectedCat===c.id?' active':''}" onclick="selectTTCat('${c.id}',this)">${c.name}</div>`).join('');
  document.getElementById('ttEntryField').value=ttEntryLabel;
  // Delete button
  document.getElementById('ttDelBtn')?.remove();
  const del=document.createElement('button');
  del.id='ttDelBtn';
  del.style.cssText='width:100%;background:none;border:none;border-radius:12px;padding:12px;color:rgba(224,85,85,0.55);font-size:14px;font-family:inherit;cursor:pointer;margin-top:6px';
  del.textContent='Usuń';
  del.onclick=()=>deleteTTEntry(ttEditingEntryId);
  document.getElementById('ttEntryPanel').appendChild(del);
  document.getElementById('ttEntryPanel').classList.add('open');
  renderTTGrid();
}
function deleteTTEntry(entryId){
  const k=today();
  if(state.timeEntries?.[k]) state.timeEntries[k]=state.timeEntries[k].filter(e=>e.id!==entryId);
  save(); closeTTEntry();
}
function selectTTCat(id,el){
  ttSelectedCat=id;
  document.querySelectorAll('.tt-cat-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  // If there's text in the field, auto-save
  const label=document.getElementById('ttEntryField')?.value.trim();
  if(label||ttSelBlocks.size>0) saveTTEntry();
}

document.getElementById('ttEntryField').addEventListener('input',e=>{ ttEntryLabel=e.target.value; });
document.getElementById('ttEntryField').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); saveTTEntry(); } });

function saveTTEntry(){
  if(ttSelBlocks.size===0) return;
  const label=document.getElementById('ttEntryField').value.trim();
  const blocks=Array.from(ttSelBlocks).map(k=>{ const[h,q]=k.split(':'); return{h:parseInt(h),q:parseInt(q)}; });
  const k=today();
  const entries=getTodayEntries();

  if(ttEditingEntryId){
    // Editing: update existing entry
    const idx=entries.findIndex(e=>e.id===ttEditingEntryId);
    if(idx>=0) entries[idx]={...entries[idx],label,catId:ttSelectedCat,blocks};
  } else {
    // New entry: remove selected blocks from any existing entries first
    for(const e of entries){
      e.blocks=(e.blocks||[]).filter(b=>!ttSelBlocks.has(`${b.h}:${b.q}`));
    }
    // Remove entries with no blocks left
    if(state.timeEntries?.[k]) state.timeEntries[k]=entries.filter(e=>e.blocks.length>0);
    getTodayEntries().push({id:'tt'+Date.now(),label,catId:ttSelectedCat,blocks});
  }
  save(); closeTTEntry(); closeTimeTracker();
}

    if(!moved) return;
    const dx=e.changedTouches[0].clientX-sx;
    moved=false;
    requestAnimationFrame(()=>{
      av.style.transition=''; ts.style.transition='';
      requestAnimationFrame(()=>{
        if(dx>70) closeAllTasksView();
        else{ av.style.transform='translateX(0)'; ts.style.transform='translateX(-28%)'; }
      });
    });
  },{passive:true});
})();

/* ══════════════════════════════════════════
   MONEY
══════════════════════════════════════════ */
let _moneySelCat=null;
let _moneyAmount='0';

function openMoney(){
  _moneySelCat=(state.moneyCategories||[])[0]?.id||null;
  _moneyAmount='0';
  document.getElementById('moneyAmountInput').value='';
  document.getElementById('moneyNoteInput').value='';
  document.getElementById('moneyDisplay').textContent='0';
  renderMoneyCats();
  // Animate: money slides in, home slides back — no class juggling
  document.getElementById('home').classList.add('slide-out');
  document.getElementById('moneyOverlay').style.transform='translateX(0)';
  // Focus numeric input — synchronous in gesture handler chain
  document.getElementById('moneyAmountInput').focus();
}

function closeMoney(){
  document.activeElement?.blur();
  document.getElementById('moneyOverlay').style.transform='translateX(100%)';
  document.getElementById('home').classList.remove('slide-out');
  document.getElementById('home').style.transform='';
  _moneySelCat=null;
}

function moneyAmountOninput(val){
  const clean=val.replace(/[^0-9.,]/g,'').replace(',','.').replace(/(\..*)\./g,'$1');
  const inp=document.getElementById('moneyAmountInput');
  if(inp.value!==clean) inp.value=clean;
  _moneyAmount=clean||'0';
  document.getElementById('moneyDisplay').textContent=_moneyAmount;
}

function moneyAmountKeydown(e){
  if(e.key!=='Enter') return;
  e.preventDefault();
  document.getElementById('moneyAmountInput').blur();
  saveMoney();
}

function renderMoneyCats(){
  const row=document.getElementById('moneyCatRow');
  if(!row) return;
  const cats=(state.moneyCategories||[]).slice().sort((a,b)=>(a.order||0)-(b.order||0));
  row.innerHTML=cats.map(c=>{
    const isSel=_moneySelCat===c.id;
    const bg=isSel?'rgba(61,221,101,0.28)':'rgba(255,255,255,0.32)';
    const fw=isSel?'600':'500';
    return `<div onclick="selectAndSave('${c.id}')" style="padding:18px 26px;border-radius:var(--radius);background:${bg};backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;font-size:18px;font-weight:${fw};cursor:pointer;transition:all .15s;text-align:left;letter-spacing:-.02em;">${c.name}</div>`;
  }).join('');
}

function selectAndSave(id){
  _moneySelCat=id;
  saveMoney();
}

function saveMoney(){
  const amount=parseFloat(_moneyAmount.replace(',','.'));
  if(!amount||isNaN(amount)){ closeMoney(); return; }
  const note=document.getElementById('moneyNoteInput').value.trim();
  if(!state.moneyEntries) state.moneyEntries=[];
  state.moneyEntries.push({id:'m'+Date.now(),date:today(),amount,catId:_moneySelCat,note});
  save(); closeMoney();
}

// Swipe right from left edge of money → close
(()=>{
  let sx=0,sy=0,ok=false;
  const ov=document.getElementById('moneyOverlay');
  ov.addEventListener('touchstart',e=>{
    sx=e.touches[0].clientX; sy=e.touches[0].clientY; ok=sx<28;
  },{passive:true});
  ov.addEventListener('touchend',e=>{
    if(!ok) return; ok=false;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=Math.abs(e.changedTouches[0].clientY-sy);
    if(dx>52&&dy<80) closeMoney();
  },{passive:true});
})();


function getMoneyStats(days){
  const now=new Date();
  const entries=(state.moneyEntries||[]).filter(e=>{
    const d=new Date(e.date);
    return (now-d)/(1000*60*60*24)<=days;
  });
  const byCat={};
  for(const e of entries){
    if(!byCat[e.catId]) byCat[e.catId]={total:0,entries:[]};
    byCat[e.catId].total+=e.amount;
    byCat[e.catId].entries.push(e);
  }
  return byCat;
}

function renderMoneySettings(){
  const cats=(state.moneyCategories||[]).slice().sort((a,b)=>(a.order||0)-(b.order||0));
  const period=state._statPeriod||7;
  const stats=getMoneyStats(period);
  const total=Object.values(stats).reduce((s,v)=>s+v.total,0);

  // Palette for categories
  const palette=['#60a5fa','#f472b6','#fb923c','#a78bfa','#34d399','#fbbf24','#f87171','#38bdf8'];

  let html='<div style="padding:8px 0">';

  // period toggle is shared (shown once above)

  if(total===0){
    html+=`<div style="text-align:center;color:rgba(255,255,255,0.25);font-size:13px;padding:16px 0">Brak wpisów</div>`;
  } else {
    // Pie chart SVG
    const R=64, cx=72, cy=72;
    let svgPaths='', legendHtml='', startAngle=-Math.PI/2;
    const catEntries=Object.entries(stats).filter(([,v])=>v.total>0);
    if(catEntries.length===1){
      // Single category — full circle
      const [[catId,{total:catTotal}]]=catEntries;
      const cat=cats.find(c=>c.id===catId);
      const color=cat?.color||palette[0];
      svgPaths=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="${color}" opacity="0.85"/>`;
      legendHtml=`<div style="display:flex;align-items:center;gap:8px;padding:2px 0"><span style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block"></span><span style="flex:1;font-size:13px;color:rgba(255,255,255,0.7)">${cat?.name||catId}</span><span style="font-size:13px;font-weight:600;color:#fff">100%</span><span style="font-size:13px;color:rgba(255,255,255,0.5)">${Math.round(catTotal)} zł</span></div>`;
    } else {
      catEntries.forEach(([catId,{total:catTotal}],i)=>{
        const cat=cats.find(c=>c.id===catId);
        const color=cat?.color||palette[i%palette.length];
        const angle=(catTotal/total)*Math.PI*2;
        const endAngle=startAngle+angle;
        const x1=cx+R*Math.cos(startAngle), y1=cy+R*Math.sin(startAngle);
        const x2=cx+R*Math.cos(endAngle), y2=cy+R*Math.sin(endAngle);
        const large=angle>Math.PI?1:0;
        svgPaths+=`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${color}" opacity="0.85"/>`;
        startAngle=endAngle;
        const pct=Math.round(catTotal/total*100);
        legendHtml+=`<div style="display:flex;align-items:center;gap:8px;padding:2px 0"><span style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block"></span><span style="flex:1;font-size:13px;color:rgba(255,255,255,0.7)">${cat?.name||catId}</span><span style="font-size:13px;font-weight:600;color:#fff">${pct}%</span><span style="font-size:13px;color:rgba(255,255,255,0.5)">${Math.round(catTotal)} zł</span></div>`;
      });
    }

    html+=`<div style="display:flex;align-items:center;gap:16px;margin-bottom:18px;justify-content:center">`;
    html+=`<svg width="144" height="144" viewBox="0 0 144 144"><circle cx="72" cy="72" r="${R}" fill="rgba(255,255,255,0.05)"/>${svgPaths}<circle cx="72" cy="72" r="32" fill="#000"/><text x="72" y="68" text-anchor="middle" fill="#fff" font-size="16" font-weight="200" font-family="-apple-system,sans-serif">${Math.round(total)}</text><text x="72" y="84" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10" font-family="-apple-system,sans-serif">zł</text></svg>`;
    html+=`<div style="display:flex;flex-direction:column;gap:4px">${legendHtml}</div>`;
    html+=`</div>`;

    // Per-category breakdown: name header + day-of-week rows
    const days=['Nd','Pn','Wt','Śr','Cz','Pt','So'];
    catEntries.forEach(([catId,{total:catTotal,entries:catEnts}],i)=>{
      const cat=cats.find(c=>c.id===catId);
      const color=cat?.color||palette[i%palette.length];
      html+=`<div style="margin-bottom:14px">`;
      html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">`;
      html+=`<span style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block"></span>`;
      html+=`<span style="font-size:16px;font-weight:500;color:#fff;flex:1">${cat?.name||catId}</span>`;
      html+=`<span style="font-size:16px;color:rgba(255,255,255,0.5)">${Math.round(catTotal)} zł</span>`;
      html+=`</div>`;
      const sorted=[...catEnts].sort((a,b)=>new Date(b.date)-new Date(a.date));
      sorted.slice(0,5).forEach(e=>{
        const d=new Date(e.date);
        const dayLabel=days[d.getDay()];
        const label=e.note||'';
        html+=`<div style="display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:10px;background:rgba(255,255,255,0.05);margin-bottom:4px">`;
        html+=`<span style="font-size:13px;color:rgba(255,255,255,0.4);width:18px;text-align:center;flex-shrink:0">${dayLabel}</span>`;
        html+=`<span style="flex:1;font-size:14px;color:rgba(255,255,255,0.7);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${label}</span>`;
        html+=`<span style="font-size:14px;font-weight:500;color:#fff;flex-shrink:0">${Math.round(e.amount)} zł</span>`;
        html+=`</div>`;
      });
      html+=`</div>`;
    });
  }


  html+=`</div>`;
  return html;
}

function setHabitStatPeriod(d){ state._habitStatPeriod=d; save(); renderSettings(); }
function setStatPeriod(d){ state._statPeriod=d; save(); renderSettings(); }
function setTimeStatPeriod(p){ setStatPeriod(p==='month'?30:p); }

function openAddMoneyCat(){
  const existing=document.getElementById('mcAddOverlay');
  if(existing){ existing.remove(); return; }
  const ov=document.createElement('div');
  ov.id='mcAddOverlay';
  ov.style.cssText='position:fixed;inset:0;z-index:600;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);padding:0 20px 40px';
  ov.innerHTML=`<div style="width:100%;max-width:400px;background:#1a1a1a;border-radius:16px;padding:20px">
    <input id="mcAddInput" style="width:100%;background:rgba(255,255,255,0.1);border:none;border-radius:10px;padding:12px 14px;color:#fff;font-size:16px;font-family:inherit;outline:none;margin-bottom:12px;text-align:center" placeholder="" autocapitalize="sentences">
    <button onclick="confirmAddMoneyCat()" class="save-btn">Dodaj</button>

}

function confirmAddMoneyCat(){
  const input=document.getElementById('mcAddInput');
  const name=input?.value.trim();
  document.getElementById('mcAddOverlay')?.remove();
  if(!name) return;
  if(!state.moneyCategories) state.moneyCategories=[];
  const order=state.moneyCategories.length;
  state.moneyCategories.push({id:'mc'+Date.now(),name,order});
  save(); renderSettings();
}

function deleteMoneyCat(id){
  state.moneyCategories=(state.moneyCategories||[]).filter(c=>c.id!==id);
  save(); renderSettings();
}

// Drag reorder for money categories
let mcDragId=null;
function mcDragStart(e,id){ mcDragId=id; e.dataTransfer.effectAllowed='move'; }
function mcDragOver(e,id){ e.preventDefault(); }
function mcDragDrop(e,id){ e.preventDefault(); mcReorder(mcDragId,id); }
function mcDragEnd(){ mcDragId=null; }
let mcTDragId=null,mcTDragOver=null,mcTMoved=false,mcTActive=false,mcTStartX=0,mcTStartY=0,mcTTimer=null;
function mcTouchStart(e,id){ mcTDragId=id; mcTMoved=false; mcTActive=false; mcTStartX=e.touches[0].clientX; mcTStartY=e.touches[0].clientY; mcTTimer=setTimeout(()=>{ mcTActive=true; },280); }
function mcTouchMove(e){
  if(!mcTDragId) return;
  const dx=Math.abs(e.touches[0].clientX-mcTStartX),dy=Math.abs(e.touches[0].clientY-mcTStartY);
  if(dx>8||dy>8){
    if(!mcTActive){ clearTimeout(mcTTimer); mcTDragId=null; return; }
    mcTMoved=true; e.preventDefault();
    const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY)?.closest('[data-mcid]');
    if(el) mcTDragOver=el.dataset.mcid;
  }
}
function mcTouchEnd(e,id){ clearTimeout(mcTTimer); if(mcTActive&&mcTMoved&&mcTDragOver&&mcTDragOver!==mcTDragId) mcReorder(mcTDragId,mcTDragOver); else renderSettings(); mcTDragId=null; mcTDragOver=null; mcTMoved=false; mcTActive=false; }
function mcReorder(fromId,toId){
  if(!fromId||!toId||fromId===toId){ renderSettings(); return; }
  const arr=state.moneyCategories;
  const fi=arr.findIndex(c=>c.id===fromId),ti=arr.findIndex(c=>c.id===toId);
  if(fi<0||ti<0){ renderSettings(); return; }
  const [item]=arr.splice(fi,1); arr.splice(ti,0,item);
  arr.forEach((c,i)=>c.order=i); save(); renderSettings();
}
